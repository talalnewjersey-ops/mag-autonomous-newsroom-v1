name: NEXUS-14 Image Backfill (SAFE)

on:
  workflow_dispatch:
    inputs:
      market:
        description: 'Market filter'
        required: false
        default: ''
        type: choice
        options: ['', USA, CANADA]
      article_ids:
        description: 'Comma-separated post IDs (empty = all without featured image)'
        required: false
        default: ''
      max_articles:
        description: 'Max articles (0 = no cap)'
        required: false
        default: '3'
      dry_run:
        description: 'Dry run (no Gemini calls, no WP writes)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  backfill:
    name: Backfill featured images (safe)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install requests aiohttp
      - name: Run safe featured-image backfill
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NANO_BANANA_KEY: ${{ secrets.NANO_BANANA_KEY }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
        run: |
          ARGS=(--max-articles "${{ github.event.inputs.max_articles }}")
          [ -n "${{ github.event.inputs.market }}" ] && ARGS+=(--market "${{ github.event.inputs.market }}")
          [ -n "${{ github.event.inputs.article_ids }}" ] && ARGS+=(--article-ids "${{ github.event.inputs.article_ids }}")
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && ARGS+=(--dry-run)
          python scripts/backfill_images.py "${ARGS[@]}"
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backfill-images-report
          path: output/backfill_images_report.json
          retention-days: 14
