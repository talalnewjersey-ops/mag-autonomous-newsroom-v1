name: Scan Published Articles for French-Language Residue (read-only diagnostic)

on:
  workflow_dispatch:

# READ-ONLY: NOT a real language detector -- targeted scan for the most
# obvious French-language leftovers on this English-language site (accented
# characters, a specific emoji marker, common French words/phrases). Part
# of the published-content audit workstream. Never writes to WordPress.
jobs:
  scan-french-residue:
    name: "Scan published posts for French residue"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Scan published posts
        env:
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
        run: python3 scripts/scan_french_residue.py
      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: french-residue-scan
          path: french_residue_scan_results.json
