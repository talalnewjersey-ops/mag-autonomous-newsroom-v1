name: Create WordPress PHP-wrapped CSS Snippet (write, static echo only)

on:
  workflow_dispatch:
    inputs:
      snippet_name:
        description: "Snippet name"
        required: true
      snippet_desc:
        description: "Snippet description"
        required: false
        default: ""
      css_file:
        description: "Path (in this repo checkout) to the file holding the CSS to echo"
        required: true
      style_id:
        description: "HTML id for the generated <style> tag"
        required: false
        default: "mag-wp-head-css"
      active:
        description: "Activate immediately"
        required: true
        default: "true"
      confirm:
        description: "Type 'yes' to actually write (safety gate)"
        required: true
        default: "no"

# WRITE ACTION: creates a scope=global Code Snippets entry, but the PHP body
# is entirely generated by the script from a fixed template -- it can only
# ever echo a static <style> block via wp_head. Explicit user approval was
# obtained (2026-07-13) before this workflow was introduced, given scope=
# global otherwise executes arbitrary PHP.
jobs:
  create-snippet:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Create PHP-wrapped CSS snippet
        env:
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
          SNIPPET_NAME: ${{ github.event.inputs.snippet_name }}
          SNIPPET_DESC: ${{ github.event.inputs.snippet_desc }}
          CSS_FILE: ${{ github.event.inputs.css_file }}
          STYLE_ID: ${{ github.event.inputs.style_id }}
          ACTIVE: ${{ github.event.inputs.active }}
          CONFIRM: ${{ github.event.inputs.confirm }}
        run: python3 scripts/create_wp_php_css_snippet.py
