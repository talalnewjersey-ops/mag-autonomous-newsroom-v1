# ============================================================
# NEXUS-14 V3 — Quality-First Production Workflow
# MoneyAbroadGuide.com Quality-First Newsroom
# Version: 3.0.0 | Upgraded: 2026-06-12
#
# NEW IN V3: Agent 17 (Cannibalization) + Agent 18 (Revenue)
#            18 Quality Gates | STANDARD/PILLAR types
#
# STRATEGY: Maximum 6 articles/day | Quality over Volume
#
# Schedule:
#   Batch 1: 06:00 UTC — max 3 articles
#   Audit 1: 09:30 UTC
#   Report 1: 09:45 UTC
#   Batch 2: 13:00 UTC — max 3 articles
#   Audit 2: 16:30 UTC
#   Report 2: 18:00 UTC
#   Executive Report: 18:30 UTC
# ============================================================

name: "NEXUS-14 V3 — Quality-First Production"

on:
  schedule:
    # Batch 1 — 06:00 UTC
    - cron: "0 6 * * *"
    # Global Audit 1 — 09:30 UTC
    - cron: "30 9 * * *"
    # Morning Production Report — 09:45 UTC
    - cron: "45 9 * * *"
    # Batch 2 — 13:00 UTC
    - cron: "0 13 * * *"
    # Global Audit 2 — 16:30 UTC
    - cron: "30 16 * * *"
    # Evening Production Report — 18:00 UTC
    - cron: "0 18 * * *"
    # Executive Daily Report — 18:30 UTC
    - cron: "30 18 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Production mode"
        required: true
        default: "batch_1"
        type: choice
        options:
          - batch_1
          - batch_2
          - audit
          - executive_report
          - end_to_end_test
      max_articles:
        description: "Max articles (V2 limit: 3 per batch)"
        required: false
        default: "3"
      topic_override:
        description: "Override topic (optional)"
        required: false
        default: ""

env:
  PYTHON_VERSION: "3.11"
  MAX_ARTICLES_PER_BATCH: 3
  MAX_ARTICLES_PER_DAY: 6
  MIN_WORD_COUNT: 5000
  TARGET_WORD_COUNT: 7000
  MIN_IMAGES: 5
  MIN_FAQ: 20
  MIN_INTERNAL_LINKS: 5
  MIN_SOURCES: 10
  MIN_CASE_STUDIES: 3
  SEO_SCORE_THRESHOLD: 90
  EEAT_SCORE_THRESHOLD: 90
  SYSTEM_VERSION: "V2"
  QUALITY_FIRST: "true"

jobs:
  # ============================================================
  # JOB 1: ROUTE BASED ON TRIGGER TIME
  # ============================================================
  route-trigger:
    name: "Route — Identify Trigger Mode"
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.detect.outputs.mode }}
      max_articles: ${{ steps.detect.outputs.max_articles }}
    steps:
      - name: Detect trigger mode
        id: detect
        run: |
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
            echo "max_articles=${{ github.event.inputs.max_articles }}" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "06" ]; then
            echo "mode=batch_1" >> $GITHUB_OUTPUT
            echo "max_articles=3" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "09" ] && [ "$MINUTE" = "30" ]; then
            echo "mode=audit" >> $GITHUB_OUTPUT
            echo "max_articles=0" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "09" ] && [ "$MINUTE" = "45" ]; then
            echo "mode=morning_report" >> $GITHUB_OUTPUT
            echo "max_articles=0" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "13" ]; then
            echo "mode=batch_2" >> $GITHUB_OUTPUT
            echo "max_articles=3" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "16" ]; then
            echo "mode=audit" >> $GITHUB_OUTPUT
            echo "max_articles=0" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "18" ] && [ "$MINUTE" = "00" ]; then
            echo "mode=evening_report" >> $GITHUB_OUTPUT
            echo "max_articles=0" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "18" ] && [ "$MINUTE" = "30" ]; then
            echo "mode=executive_report" >> $GITHUB_OUTPUT
            echo "max_articles=0" >> $GITHUB_OUTPUT
          else
            echo "mode=batch_1" >> $GITHUB_OUTPUT
            echo "max_articles=3" >> $GITHUB_OUTPUT
          fi

  # ============================================================
  # JOB 2: PRODUCTION BATCH (Batch 1 or Batch 2)
  # ============================================================
  production-batch:
    name: "Production Batch — Max ${{ env.MAX_ARTICLES_PER_BATCH }} Articles"
    runs-on: ubuntu-latest
    needs: route-trigger
    if: |
      needs.route-trigger.outputs.mode == 'batch_1' ||
      needs.route-trigger.outputs.mode == 'batch_2' ||
      needs.route-trigger.outputs.mode == 'end_to_end_test'
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Phase 1 — SEO Research (Agent 01)"
        id: seo_research
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SEMRUSH_API_KEY: ${{ secrets.SEMRUSH_API_KEY }}
        run: |
          python -m agents.agent_01_seo_research \
            --max-topics ${{ env.MAX_ARTICLES_PER_BATCH }} \
            --output output/agent_01/topics.json
          echo "Topics generated successfully"

      - name: "Phase 2 — Keyword Validation (Agent 02)"
        id: keyword_validation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: |
          python -m agents.agent_02_keyword_validation \
            --input output/agent_01/topics.json \
            --output output/agent_02/validated_topics.json


      - name: "Phase 2.5 — Cannibalization Check (Agent 17) [NEW V3]"
        id: cannibalization_check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
        run: |
          mkdir -p output/agent_17
          python -m agents.agent_17_cannibalization \
            --topic "$(cat output/agent_02/validated_topics.json | python3 -c 'import json,sys; topics=json.load(sys.stdin); print(topics[0].get("title",topics[0]) if isinstance(topics[0],dict) else topics[0])')" \
            --keywords "$(cat output/agent_02/validated_topics.json | python3 -c 'import json,sys; topics=json.load(sys.stdin); kws=topics[0].get("keywords",[]) if isinstance(topics[0],dict) else []; print(",".join(kws[:5]))')" \
            --output output/agent_17/cannibalization_report.json
          echo "Cannibalization check complete"
          # Check if blocking
          DECISION=$(cat output/agent_17/cannibalization_report.json | python3 -c 'import json,sys; r=json.load(sys.stdin); print(r.get("decision","UNKNOWN"))')
          BLOCKING=$(cat output/agent_17/cannibalization_report.json | python3 -c 'import json,sys; r=json.load(sys.stdin); print(r.get("blocking",True))')
          echo "Decision: $DECISION | Blocking: $BLOCKING"
          if [ "$BLOCKING" = "True" ]; then
            echo "ERROR: Topic rejected by Agent 17 - $DECISION"
            exit 1
          fi

      - name: "Phase 2.6 — Revenue Intelligence (Agent 18) [NEW V3]"
        id: revenue_intelligence
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p output/agent_18
          python -m agents.agent_18_revenue_intelligence \
            --topic "$(cat output/agent_02/validated_topics.json | python3 -c 'import json,sys; topics=json.load(sys.stdin); print(topics[0].get("title",topics[0]) if isinstance(topics[0],dict) else topics[0])')" \
            --keywords "$(cat output/agent_02/validated_topics.json | python3 -c 'import json,sys; topics=json.load(sys.stdin); kws=topics[0].get("keywords",[]) if isinstance(topics[0],dict) else []; print(",".join(kws[:5]))')" \
            --output output/agent_18/revenue_score.json
          echo "Revenue intelligence complete"
          # Check revenue score
          SCORE=$(cat output/agent_18/revenue_score.json | python3 -c 'import json,sys; r=json.load(sys.stdin); print(r.get("revenue_score",0))')
          DECISION=$(cat output/agent_18/revenue_score.json | python3 -c 'import json,sys; r=json.load(sys.stdin); print(r.get("decision","UNKNOWN"))')
          echo "Revenue Score: $SCORE/100 | Decision: $DECISION"
          if [ "$SCORE" -lt 60 ] 2>/dev/null; then
            echo "ERROR: Topic rejected by Agent 18 - Revenue score $SCORE < 60"
            exit 1
          fi
          # Set article type for downstream steps
          ARTICLE_TYPE=$(cat output/agent_18/revenue_score.json | python3 -c 'import json,sys; r=json.load(sys.stdin); print("PILLAR" if r.get("revenue_score",0) > 85 else "STANDARD")')
          echo "ARTICLE_TYPE=$ARTICLE_TYPE" >> $GITHUB_ENV
          echo "Article type set to: $ARTICLE_TYPE"

      - name: "Phase 3 — Content Planning (Agent 03)"
        id: content_planning
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m agents.agent_03_content_planner \
            --input output/agent_02/validated_topics.json \
            --output output/agent_03/article_outline.json

      - name: "Phase 4 — Article Writing (Agent 04 — Claude API)"
        id: article_writing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m agents.agent_04_article_writer \
            --input output/agent_03/article_outline.json \
            --output output/agent_04/article_draft.md \
            --min-words ${{ env.MIN_WORD_COUNT }} \
            --target-words ${{ env.TARGET_WORD_COUNT }}

      - name: "Phase 5 — Fact Checking (Agent 05)"
        id: fact_checking
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m agents.agent_05_fact_checker \
            --input output/agent_04/article_draft.md \
            --output output/agent_05/fact_check_report.json \
            --min-sources ${{ env.MIN_SOURCES }}

      - name: "Phase 6 — EEAT Validation (Agent 06)"
        id: eeat_validation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m agents.agent_06_eeat_validator \
            --input output/agent_04/article_draft.md \
            --output output/agent_06/eeat_report.json \
            --threshold ${{ env.EEAT_SCORE_THRESHOLD }}

      - name: "Phase 7 — Internal Linking (Agent 07)"
        id: internal_linking
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
        run: |
          python -m agents.agent_07_internal_linking \
            --input output/agent_04/article_draft.md \
            --output output/agent_07/internal_links.json \
            --min-links ${{ env.MIN_INTERNAL_LINKS }}

      - name: "Phase 8 — Affiliate Optimization (Agent 08)"
        id: affiliate_optimization
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m agents.agent_08_affiliate_optimizer \
            --input output/agent_04/article_draft.md \
            --output output/agent_08/affiliate_report.json

      - name: "Phase 9 — Image Prompt Generation (Agent 09)"
        id: image_prompts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m agents.agent_09_image_prompt_generator \
            --input output/agent_04/article_draft.md \
            --output output/agent_09/image_prompts.json \
            --count 5

      - name: "Phase 10 — Image Production (Agent 10 — Gemini + NanoBanana)"
        id: image_production
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NANO_BANANA_KEY: ${{ secrets.NANO_BANANA_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          python -m agents.agent_10_image_production \
            --input output/agent_09/image_prompts.json \
            --output output/agent_10/ \
            --validation-report output/agent_10/image_validation_report.json \
            --min-images ${{ env.MIN_IMAGES }}

      - name: "Phase 10.5 — Affiliate Compliance (Agent 15 — NEW V2)"
        id: affiliate_compliance
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m agents.agent_15_affiliate_compliance \
            --input output/agent_04/article_draft.md \
            --affiliate-data output/agent_08/affiliate_report.json \
            --output output/agent_15/affiliate_compliance.json

      - name: "Phase 10.6 — Publishing Optimization (Agent 16 — NEW V2)"
        id: publishing_optimization
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
        run: |
          python -m agents.agent_16_publishing_optimization \
            --input output/agent_04/article_draft.md \
            --faq-data output/agent_03/article_outline.json \
            --image-url output/agent_10/featured_image_url.txt \
            --output output/agent_16/publishing_optimizer.json

      - name: "Phase 11 — WordPress Integration (Agent 11)"
        id: wordpress_integration
        env:
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m agents.agent_11_wordpress_integration \
            --article output/agent_04/article_draft.md \
            --images output/agent_10/ \
            --rank-math output/agent_16/publishing_optimizer.json \
            --output output/agent_11/wordpress_report.json \
            --validation-report output/agent_11/wordpress_validation_report.json

      - name: "Phase 12 — Quality Assurance (Agent 12)"
        id: quality_assurance
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
        run: |
          python -m agents.agent_12_quality_assurance \
            --article output/agent_04/article_draft.md \
            --wordpress-report output/agent_11/wordpress_report.json \
            --image-validation output/agent_10/image_validation_report.json \
            --affiliate-compliance output/agent_15/affiliate_compliance.json \
            --publishing-optimizer output/agent_16/publishing_optimizer.json \
            --output output/agent_12/qa_report.json \
            --min-words ${{ env.MIN_WORD_COUNT }} \
            --min-images ${{ env.MIN_IMAGES }} \
            --min-faq ${{ env.MIN_FAQ }} \
            --min-links ${{ env.MIN_INTERNAL_LINKS }} \
            --min-sources ${{ env.MIN_SOURCES }} \
            --min-case-studies ${{ env.MIN_CASE_STUDIES }} \
            --seo-threshold ${{ env.SEO_SCORE_THRESHOLD }} \
            --eeat-threshold ${{ env.EEAT_SCORE_THRESHOLD }}

      - name: "Phase 13 — Chief Editor Decision (Agent 13)"
        id: chief_editor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m agents.agent_13_chief_editor \
            --qa-report output/agent_12/qa_report.json \
            --article output/agent_04/article_draft.md \
            --output output/agent_13/editor_report.json

      - name: "V2 Quality Gate — Validate READY_TO_PUBLISH"
        id: quality_gate
        run: |
          python scripts/v2_quality_gate.py \
            --qa-report output/agent_12/qa_report.json \
            --editor-report output/agent_13/editor_report.json \
            --image-validation output/agent_10/image_validation_report.json \
            --wordpress-validation output/agent_11/wordpress_validation_report.json \
            --affiliate-compliance output/agent_15/affiliate_compliance.json \
            --publishing-optimizer output/agent_16/publishing_optimizer.json \
            --content-validation output/content_validation_report.json \\
            --cannibalization-report output/agent_17/cannibalization_report.json \\
            --revenue-score output/agent_18/revenue_score.json \\
            --article-type ${ARTICLE_TYPE:-STANDARD} \\
            --output output/quality_gate_result.json

      - name: "Generate Content Validation Report"
        run: |
          python scripts/generate_content_validation_report.py \
            --article output/agent_04/article_draft.md \
            --outline output/agent_03/article_outline.json \
            --output output/content_validation_report.json

      - name: Upload all validation reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "nexus14-v2-reports-${{ github.run_id }}"
          retention-days: 30
          path: |
            output/agent_10/image_validation_report.json
            output/agent_10/image_quality_report.json
            output/agent_11/wordpress_validation_report.json
            output/agent_12/qa_report.json
            output/agent_13/editor_report.json
            output/agent_15/affiliate_compliance.json
            output/agent_16/publishing_optimizer.json
            output/agent_17/cannibalization_report.json
            output/agent_18/revenue_score.json
            output/content_validation_report.json
            output/quality_gate_result.json

  # ============================================================
  # JOB 3: GLOBAL QUALITY AUDIT
  # ============================================================
  global-audit:
    name: "Global Quality Audit (Agent 13)"
    runs-on: ubuntu-latest
    needs: route-trigger
    if: needs.route-trigger.outputs.mode == 'audit'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt

      - name: Run Chief Editor Global Audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
        run: |
          python -m agents.agent_13_chief_editor \
            --mode global-audit \
            --output output/agent_13/global_audit_report.json

      - name: Run Production Director Audit Summary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: |
          python -m agents.agent_14_production_director \
            --mode audit \
            --output output/agent_14/audit_summary.json

  # ============================================================
  # JOB 4: PRODUCTION REPORTS
  # ============================================================
  production-report:
    name: "Production Report (Agent 14)"
    runs-on: ubuntu-latest
    needs: route-trigger
    if: |
      needs.route-trigger.outputs.mode == 'morning_report' ||
      needs.route-trigger.outputs.mode == 'evening_report' ||
      needs.route-trigger.outputs.mode == 'executive_report'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt

      - name: Generate and Send Production Report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: |
          python -m agents.agent_14_production_director \
            --mode ${{ needs.route-trigger.outputs.mode }} \
            --output output/agent_14/daily_production_report.html \
            --system-version V2 \
            --max-daily ${{ env.MAX_ARTICLES_PER_DAY }} \
            --quality-first true

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "nexus14-v2-daily-report-${{ github.run_id }}"
          retention-days: 90
          path: output/agent_14/daily_production_report.html

  # ============================================================
  # JOB 5: END-TO-END TEST
  # ============================================================
  end-to-end-test:
    name: "End-to-End Test — Full Production Cycle"
    runs-on: ubuntu-latest
    needs: route-trigger
    if: needs.route-trigger.outputs.mode == 'end_to_end_test'
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt

      - name: Run Full End-to-End Test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NANO_BANANA_KEY: ${{ secrets.NANO_BANANA_KEY }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: |
          python scripts/end_to_end_test.py \
            --output output/end_to_end_test_report.html \
            --system-version V2 \
            --max-articles 1 \
            --require-real-wordpress true \
            --require-real-images true \
            --require-all-validation-reports true

      - name: Upload E2E Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "nexus14-v2-e2e-test-${{ github.run_id }}"
          retention-days: 90
          path: |
            output/end_to_end_test_report.html
            output/agent_10/image_validation_report.json
            output/agent_11/wordpress_validation_report.json
            output/agent_12/qa_report.json
            output/agent_15/affiliate_compliance.json
            output/agent_16/publishing_optimizer.json
            output/content_validation_report.json
