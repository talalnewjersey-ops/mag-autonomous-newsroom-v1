# ============================================================
# NEXUS-14 ENTERPRISE v3.0 — Production Workflow COST-OPTIMIZED
# MoneyAbroadGuide.com — Canada Newcomer Priority Production
# Version: 3.1.0-COST-OPT | Updated: 2026-06-14
#
# COST OPTIMIZATION V5 — THREE-TIER SYSTEM:
# TIER 1 PILLAR:     4,500-5,000 words | 12 FAQs | 3 case studies
# TIER 2 STANDARD:   4,000-4,500 words | 10 FAQs | 2 case studies (DEFAULT)
# TIER 3 OPPORTUNITY:3,500-4,000 words |  8 FAQs | 1-2 case studies
#
# CANADA NEWCOMER PRIORITY: newcomers, immigrants, international students, PR
# ARTICLE_NUM: injected per loop iteration for unique topic selection
# ============================================================

name: "NEXUS-14 ENTERPRISE v3.0 — Gold Standard Production"

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "30 9 * * *"
    - cron: "45 9 * * *"
    - cron: "0 13 * * *"
    - cron: "30 16 * * *"
    - cron: "0 18 * * *"
    - cron: "30 18 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Production mode"
        required: true
        default: "batch_1"
        type: choice
        options:
          - batch_1
          - batch_2
          - audit
          - executive_report
          - end_to_end_test
          - rewrite_audit
      max_articles:
        description: "Max articles per batch (max 3)"
        required: false
        default: "3"
      topic_override:
        description: "Override topic (optional)"
        required: false
        default: ""

env:
  PYTHON_VERSION: "3.11"
  MAX_ARTICLES_PER_BATCH: 3
  MAX_ARTICLES_PER_DAY: 6
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # COST-OPT V5: Standard tier defaults (4000-4500w)
  MIN_WORD_COUNT: 4000
  TARGET_WORD_COUNT: 4500
  MAX_WORD_COUNT: 5000
  MIN_IMAGES: 4
  MIN_FAQ: 10
  MIN_INTERNAL_LINKS: 6
  MIN_SOURCES: 5
  MIN_CASE_STUDIES: 2
  SEO_SCORE_THRESHOLD: 90
  EEAT_SCORE_THRESHOLD: 90
  SYSTEM_VERSION: "ENTERPRISE-V3.1-COST-OPT"
  QUALITY_FIRST: "true"
  ENTERPRISE_STANDARD: "true"
  MIN_QUALITY_SCORE: 90
  MIN_SEO_SCORE: 90
  MIN_EEAT_SCORE: 90
  MIN_UX_SCORE: 90
  MIN_OVERALL_SCORE: 90
  MAX_AFFILIATE_PARTNERS: 3
  MIN_SCHEMAS: 3
  CANADA_NEWCOMER_PRIORITY: "true"

jobs:

  route-trigger:
    name: "Route — Identify Trigger Mode"
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.detect.outputs.mode }}
      max_articles: ${{ steps.detect.outputs.max_articles }}
    steps:
      - name: Detect trigger mode
        id: detect
        run: |
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
            echo "max_articles=${{ github.event.inputs.max_articles }}" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "06" ]; then
            echo "mode=batch_1" >> $GITHUB_OUTPUT
            echo "max_articles=3" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "09" ] && [ "$MINUTE" = "30" ]; then
            echo "mode=audit" >> $GITHUB_OUTPUT
            echo "max_articles=0" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "09" ] && [ "$MINUTE" = "45" ]; then
            echo "mode=morning_report" >> $GITHUB_OUTPUT
            echo "max_articles=0" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "13" ]; then
            echo "mode=batch_2" >> $GITHUB_OUTPUT
            echo "max_articles=3" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "16" ]; then
            echo "mode=audit" >> $GITHUB_OUTPUT
            echo "max_articles=0" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "18" ] && [ "$MINUTE" = "00" ]; then
            echo "mode=evening_report" >> $GITHUB_OUTPUT
            echo "max_articles=0" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "18" ] && [ "$MINUTE" = "30" ]; then
            echo "mode=executive_report" >> $GITHUB_OUTPUT
            echo "max_articles=0" >> $GITHUB_OUTPUT
          else
            echo "mode=batch_1" >> $GITHUB_OUTPUT
            echo "max_articles=3" >> $GITHUB_OUTPUT
          fi

  production-batch:
    name: "Production Batch — Max 3 Cost-Optimized Articles"
    runs-on: ubuntu-latest
    needs: route-trigger
    if: |
      needs.route-trigger.outputs.mode == 'batch_1' ||
      needs.route-trigger.outputs.mode == 'batch_2' ||
      needs.route-trigger.outputs.mode == 'end_to_end_test' ||
      needs.route-trigger.outputs.mode == 'rewrite_audit'
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Batch Loop — Run 3 Articles Sequentially"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
        run: |
          MAX_ARTICLES=${{ env.MAX_ARTICLES_PER_BATCH }}
          ARTICLES_PRODUCED=0
          ARTICLES_FAILED=0

          for ARTICLE_NUM in 1 2 3; do
            echo "=============================================="
            echo "ARTICLE ${ARTICLE_NUM} OF ${MAX_ARTICLES}"
            echo "=============================================="

            export ARTICLE_DIR="output/article_${ARTICLE_NUM}"
            mkdir -p "${ARTICLE_DIR}/agent_01" "${ARTICLE_DIR}/agent_02" "${ARTICLE_DIR}/agent_03"
            mkdir -p "${ARTICLE_DIR}/agent_04" "${ARTICLE_DIR}/agent_05" "${ARTICLE_DIR}/agent_06"
            mkdir -p "${ARTICLE_DIR}/agent_07" "${ARTICLE_DIR}/agent_08" "${ARTICLE_DIR}/agent_09"
            mkdir -p "${ARTICLE_DIR}/agent_10" "${ARTICLE_DIR}/agent_11" "${ARTICLE_DIR}/agent_12"
            mkdir -p "${ARTICLE_DIR}/agent_13" "${ARTICLE_DIR}/agent_15" "${ARTICLE_DIR}/agent_16"
            mkdir -p "${ARTICLE_DIR}/agent_17" "${ARTICLE_DIR}/agent_18"

            echo "[Article ${ARTICLE_NUM}] Phase 1: SEO Research"
            ARTICLE_NUM=${ARTICLE_NUM} python -m agents.agent_01_seo_research \
              --max-topics 1 \
              --output "${ARTICLE_DIR}/agent_01/topics.json" || { echo "Agent 01 failed"; ARTICLES_FAILED=$((ARTICLES_FAILED+1)); continue; }

            echo "[Article ${ARTICLE_NUM}] Phase 2: Keyword Validation"
            python -m agents.agent_02_keyword_validation \
              --input "${ARTICLE_DIR}/agent_01/topics.json" \
              --output "${ARTICLE_DIR}/agent_02/validated_topics.json" || { echo "Agent 02 failed"; ARTICLES_FAILED=$((ARTICLES_FAILED+1)); continue; }

            echo "[Article ${ARTICLE_NUM}] Phase 2.5: Cannibalization Check"
            TOPIC=$(cat "${ARTICLE_DIR}/agent_02/validated_topics.json" | python3 -c 'import json,sys; d=json.load(sys.stdin); topics=d.get("topics",d) if isinstance(d,dict) else d; t=topics[0] if topics else {}; print(t.get("title",t.get("keyword","newcomer banking guide")) if isinstance(t,dict) else str(t))')
            KEYWORDS=$(cat "${ARTICLE_DIR}/agent_02/validated_topics.json" | python3 -c 'import json,sys; d=json.load(sys.stdin); topics=d.get("topics",d) if isinstance(d,dict) else d; t=topics[0] if topics else {}; print(t.get("keyword","") if isinstance(t,dict) else "")')
            python -m agents.agent_17_cannibalization \
              --topic "${TOPIC}" --keywords "${KEYWORDS}" \
              --output "${ARTICLE_DIR}/agent_17/cannibalization_report.json" || true
            BLOCKING=$(cat "${ARTICLE_DIR}/agent_17/cannibalization_report.json" 2>/dev/null | python3 -c 'import json,sys; r=json.load(sys.stdin); print(r.get("blocking",True))' 2>/dev/null || echo "False")
            if [ "${BLOCKING}" = "True" ]; then
              echo "Article ${ARTICLE_NUM} SKIPPED: Cannibalization blocked"
              ARTICLES_FAILED=$((ARTICLES_FAILED+1)); continue
            fi

            echo "[Article ${ARTICLE_NUM}] Phase 2.6: Revenue Intelligence"
            SV=$(cat "${ARTICLE_DIR}/agent_02/validated_topics.json" | python3 -c 'import json,sys; d=json.load(sys.stdin); topics=d.get("topics",d) if isinstance(d,dict) else d; t=topics[0] if topics else {}; print(t.get("search_volume",0) if isinstance(t,dict) else 0)')
            CPC=$(cat "${ARTICLE_DIR}/agent_02/validated_topics.json" | python3 -c 'import json,sys; d=json.load(sys.stdin); topics=d.get("topics",d) if isinstance(d,dict) else d; t=topics[0] if topics else {}; print(t.get("cpc",0.0) if isinstance(t,dict) else 0.0)')
            python -m agents.agent_18_revenue_intelligence \
              --topic "${TOPIC}" --keywords "${KEYWORDS}" \
              --search-volume "${SV}" --cpc "${CPC}" \
              --output "${ARTICLE_DIR}/agent_18/revenue_score.json" || true
            SCORE=$(cat "${ARTICLE_DIR}/agent_18/revenue_score.json" 2>/dev/null | python3 -c 'import json,sys; r=json.load(sys.stdin); print(r.get("revenue_score",0))' 2>/dev/null || echo "0")
            if [ "${SCORE}" -lt 60 ] 2>/dev/null; then
              echo "Article ${ARTICLE_NUM} SKIPPED: Revenue score ${SCORE} < 60"
              ARTICLES_FAILED=$((ARTICLES_FAILED+1)); continue
            fi
            ARTICLE_TYPE=$(cat "${ARTICLE_DIR}/agent_18/revenue_score.json" | python3 -c 'import json,sys; r=json.load(sys.stdin); s=r.get("revenue_score",0); print("PILLAR" if s > 85 else ("OPPORTUNITY" if s < 70 else "STANDARD"))')

            echo "[Article ${ARTICLE_NUM}] Phase 3: Content Planning"
            python -m agents.agent_03_content_planner \
              --input "${ARTICLE_DIR}/agent_02/validated_topics.json" \
              --output "${ARTICLE_DIR}/agent_03/article_outline.json" || { echo "Agent 03 failed"; ARTICLES_FAILED=$((ARTICLES_FAILED+1)); continue; }

            echo "[Article ${ARTICLE_NUM}] Phase 4: Article Writing (TIER: ${ARTICLE_TYPE})"
            ARTICLE_TYPE=${ARTICLE_TYPE} python -m agents.agent_04_article_writer \
              --input "${ARTICLE_DIR}/agent_03/article_outline.json" \
              --output "${ARTICLE_DIR}/agent_04/article_draft.md" \
              --article-type "${ARTICLE_TYPE}" || { echo "Agent 04 failed"; ARTICLES_FAILED=$((ARTICLES_FAILED+1)); continue; }

            echo "[Article ${ARTICLE_NUM}] Phase 5: Fact Checking (BLOCKING GATE)"
            python -m agents.agent_05_fact_checker \
              --input "${ARTICLE_DIR}/agent_04/article_draft.md" \
              --output "${ARTICLE_DIR}/agent_05/fact_check_report.json" \
              --min-sources ${{ env.MIN_SOURCES }} || { echo "Article ${ARTICLE_NUM} BLOCKED by fact checker"; ARTICLES_FAILED=$((ARTICLES_FAILED+1)); continue; }

            echo "[Article ${ARTICLE_NUM}] Phase 6: EEAT Validation (BLOCKING GATE)"
            python -m agents.agent_06_eeat_validator \
              --input "${ARTICLE_DIR}/agent_04/article_draft.md" \
              --output "${ARTICLE_DIR}/agent_06" \
              --threshold ${{ env.EEAT_SCORE_THRESHOLD }} || { echo "Article ${ARTICLE_NUM} BLOCKED by EEAT validator"; ARTICLES_FAILED=$((ARTICLES_FAILED+1)); continue; }

            echo "[Article ${ARTICLE_NUM}] Phase 7: Internal Linking"
            python -m agents.agent_07_internal_linking \
              --input "${ARTICLE_DIR}/agent_04/article_draft.md" \
              --output "${ARTICLE_DIR}/agent_07/internal_links.json" \
              --min-links ${{ env.MIN_INTERNAL_LINKS }} || true

            echo "[Article ${ARTICLE_NUM}] Phase 8: Affiliate Optimization"
            python -m agents.agent_08_affiliate_optimizer \
              --input "${ARTICLE_DIR}/agent_04/article_draft.md" \
              --output "${ARTICLE_DIR}/agent_08/affiliate_report.json" || true

            echo "[Article ${ARTICLE_NUM}] Phase 9: Image Prompts"
            python -m agents.agent_09_image_prompt_generator \
              --input "${ARTICLE_DIR}/agent_04/article_draft.md" \
              --output "${ARTICLE_DIR}/agent_09/image_prompts.json" \
              --count ${{ env.MIN_IMAGES }} || true

            echo "[Article ${ARTICLE_NUM}] Phase 10: Image Production"
            python -m agents.agent_10_image_production \
              --input "${ARTICLE_DIR}/agent_09/image_prompts.json" \
              --output "${ARTICLE_DIR}/agent_10/" \
              --validation-report "${ARTICLE_DIR}/agent_10/image_validation_report.json" \
              --min-images ${{ env.MIN_IMAGES }} || true

            echo "[Article ${ARTICLE_NUM}] Phase 10.5: Affiliate Compliance"
            python -m agents.agent_15_affiliate_compliance \
              --input "${ARTICLE_DIR}/agent_04/article_draft.md" \
              --affiliate-data "${ARTICLE_DIR}/agent_08/affiliate_report.json" \
              --output "${ARTICLE_DIR}/agent_15/affiliate_compliance.json" || true

            echo "[Article ${ARTICLE_NUM}] Phase 10.6: Publishing Optimization"
            python -m agents.agent_16_publishing_optimization \
              --input "${ARTICLE_DIR}/agent_04/article_draft.md" \
              --faq-data "${ARTICLE_DIR}/agent_03/article_outline.json" \
              --image-url "${ARTICLE_DIR}/agent_10/featured_image_url.txt" \
              --output "${ARTICLE_DIR}/agent_16/publishing_optimizer.json" || true

            echo "[Article ${ARTICLE_NUM}] Phase 11: WordPress Integration (BLOCKING GATE)"
            python -m agents.agent_11_wordpress_integration \
              --article "${ARTICLE_DIR}/agent_04/article_draft.md" \
              --images "${ARTICLE_DIR}/agent_10/" \
              --rank-math "${ARTICLE_DIR}/agent_16/publishing_optimizer.json" \
              --output "${ARTICLE_DIR}/agent_11/wordpress_report.json" \
              --validation-report "${ARTICLE_DIR}/agent_11/wordpress_validation_report.json" || { echo "Article ${ARTICLE_NUM} BLOCKED: WP draft not created"; ARTICLES_FAILED=$((ARTICLES_FAILED+1)); continue; }

            echo "[Article ${ARTICLE_NUM}] Phase 12: Quality Assurance"
            python -m agents.agent_12_quality_assurance \
              --article "${ARTICLE_DIR}/agent_04/article_draft.md" \
              --wordpress-report "${ARTICLE_DIR}/agent_11/wordpress_report.json" \
              --image-validation "${ARTICLE_DIR}/agent_10/image_validation_report.json" \
              --affiliate-compliance "${ARTICLE_DIR}/agent_15/affiliate_compliance.json" \
              --publishing-optimizer "${ARTICLE_DIR}/agent_16/publishing_optimizer.json" \
              --output "${ARTICLE_DIR}/agent_12/qa_report.json" \
              --min-words ${{ env.MIN_WORD_COUNT }} \
              --min-images ${{ env.MIN_IMAGES }} \
              --min-faq ${{ env.MIN_FAQ }} \
              --min-links ${{ env.MIN_INTERNAL_LINKS }} \
              --min-sources ${{ env.MIN_SOURCES }} \
              --min-case-studies ${{ env.MIN_CASE_STUDIES }} \
              --seo-threshold ${{ env.SEO_SCORE_THRESHOLD }} \
              --eeat-threshold ${{ env.EEAT_SCORE_THRESHOLD }} || true

            echo "[Article ${ARTICLE_NUM}] Phase 13: Chief Editor"
            python -m agents.agent_13_chief_editor \
              --qa-report "${ARTICLE_DIR}/agent_12/qa_report.json" \
              --article "${ARTICLE_DIR}/agent_04/article_draft.md" \
              --output "${ARTICLE_DIR}/agent_13/editor_report.json" || true

            echo "[Article ${ARTICLE_NUM}] Content Validation"
            python scripts/generate_content_validation_report.py \
              --article "${ARTICLE_DIR}/agent_04/article_draft.md" \
              --outline "${ARTICLE_DIR}/agent_03/article_outline.json" \
              --output "${ARTICLE_DIR}/content_validation_report.json" || true

            echo "[Article ${ARTICLE_NUM}] Quality Gate"
            python scripts/v2_quality_gate.py \
              --qa-report "${ARTICLE_DIR}/agent_12/qa_report.json" \
              --editor-report "${ARTICLE_DIR}/agent_13/editor_report.json" \
              --image-validation "${ARTICLE_DIR}/agent_10/image_validation_report.json" \
              --image-quality "${ARTICLE_DIR}/agent_10/image_quality_report.json" \
              --wordpress-validation "${ARTICLE_DIR}/agent_11/wordpress_validation_report.json" \
              --affiliate-compliance "${ARTICLE_DIR}/agent_15/affiliate_compliance.json" \
              --publishing-optimizer "${ARTICLE_DIR}/agent_16/publishing_optimizer.json" \
              --content-validation "${ARTICLE_DIR}/content_validation_report.json" \
              --cannibalization-report "${ARTICLE_DIR}/agent_17/cannibalization_report.json" \
              --revenue-score "${ARTICLE_DIR}/agent_18/revenue_score.json" \
              --article-type "${ARTICLE_TYPE:-STANDARD}" \
              --min-quality-score ${{ env.MIN_QUALITY_SCORE }} \
              --enterprise-standard true \
              --output "${ARTICLE_DIR}/quality_gate_result.json" && {
              ARTICLES_PRODUCED=$((ARTICLES_PRODUCED+1))
              echo "Article ${ARTICLE_NUM} COMPLETE: READY_TO_PUBLISH"
            } || {
              ARTICLES_FAILED=$((ARTICLES_FAILED+1))
              echo "Article ${ARTICLE_NUM} FAILED quality gate"
            }

          done

          echo "=============================================="
          echo "BATCH COMPLETE: ${ARTICLES_PRODUCED} produced, ${ARTICLES_FAILED} failed"
          echo "=============================================="

          if [ "${ARTICLES_PRODUCED}" -eq 0 ]; then
            echo "ERROR: No articles produced in this batch"
            exit 1
          fi

      - name: Upload all article reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "nexus14-cost-opt-reports-${{ github.run_id }}"
          retention-days: 30
          path: |
            output/article_1/
            output/article_2/
            output/article_3/

  global-audit:
    name: "Global Quality Audit (Agent 13)"
    runs-on: ubuntu-latest
    needs: route-trigger
    if: needs.route-trigger.outputs.mode == 'audit'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run Chief Editor Global Audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
        run: |
          python -m agents.agent_13_chief_editor --mode global-audit --output output/agent_13/global_audit_report.json
      - name: Run Production Director Audit Summary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m agents.agent_14_production_director --mode audit --output output/agent_14/audit_summary.json

  production-report:
    name: "Production Report (Agent 14)"
    runs-on: ubuntu-latest
    needs: route-trigger
    if: |
      needs.route-trigger.outputs.mode == 'morning_report' ||
      needs.route-trigger.outputs.mode == 'evening_report' ||
      needs.route-trigger.outputs.mode == 'executive_report'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Generate Production Report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m agents.agent_14_production_director \
            --mode ${{ needs.route-trigger.outputs.mode }} \
            --output output/agent_14/daily_production_report.html \
            --system-version ENTERPRISE-V3.1-COST-OPT \
            --max-daily 6 --quality-first true
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "nexus14-daily-report-${{ github.run_id }}"
          retention-days: 90
          path: output/agent_14/daily_production_report.html

  end-to-end-test:
    name: "End-to-End Test — Full Production Cycle"
    runs-on: ubuntu-latest
    needs: route-trigger
    if: needs.route-trigger.outputs.mode == 'end_to_end_test'
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run Full End-to-End Test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
        run: |
          ARTICLE_NUM=1 python scripts/end_to_end_test.py \
            --output output/end_to_end_test_report.html \
            --system-version ENTERPRISE-V3.1-COST-OPT \
            --max-articles 1 --require-real-wordpress true \
            --require-real-images true --require-all-validation-reports true
      - name: Upload E2E Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "nexus14-e2e-test-${{ github.run_id }}"
          retention-days: 90
          path: |
            output/end_to_end_test_report.html
            output/agent_12/qa_report.json
            output/agent_11/wordpress_validation_report.json
            output/content_validation_report.json
