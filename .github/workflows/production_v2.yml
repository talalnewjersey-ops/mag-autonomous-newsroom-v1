# ============================================================
# NEXUS-14 PRODUCTION v4.0 -- Reliability-First Pipeline
# MoneyAbroadGuide.com -- Canada Newcomer Priority Production
# Version: 4.0.1-YAML-FIX | Updated: 2026-06-14
#
# KEY CHANGES FROM V3:
# FIX 1: Agent 18 Revenue Intelligence -- informational only, never blocks
# FIX 2: Agent 17 Cannibalization -- informational only, never blocks
# FIX 3: Agent 10 Images -- Gemini ONLY (Nano Banana removed)
# FIX 4: Quality Gate -- 3 gates only (FactCheck+EEAT+WP Draft)
# FIX 5 (YAML): Replaced multi-line python3 -c with single-line safe calls
# Max article: 5000 words | Canada newcomer priority
# ============================================================

name: "NEXUS-14 PRODUCTION v4.0 -- Reliability-First"

on:
  # RODAGE DRAFT-ONLY (2026-07-11): scheduled auto-runs reactivated. The
  # original SAFETY HOLD's precondition (sprint-9-publish-invariant) was
  # merged and re-proven in real conditions on 2026-07-10 (AUDIT-LOG.md,
  # control_publish_invariant.yml run 29128544472) -- the Sprint 6 reconcile
  # now promotes a topic to "published" only on true post-QA success, never
  # on agent_11's post_id alone. DRAFT_ONLY still defaults to true for ANY
  # run without an explicit override (see the Batch Loop step below,
  # unchanged) -- a scheduled run has no workflow_dispatch inputs at all, so
  # it always falls into that safe default. No cron can auto-publish during
  # this rodage phase. Criterion to flip draft_only's default to false: a
  # satisfactory >=95 QA pass rate sustained over ~1 week of these
  # draft-only runs, with the STANDARD/PILLAR GATE LENGTH gap and the
  # meta_description bug fixed in parallel (see AUDIT-LOG.md).
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Production mode"
        required: true
        default: "batch_1"
        type: choice
        options:
          - batch_1
          - batch_2
          - audit
          - executive_report
      max_articles:
        description: "Max articles (max 3)"
        required: false
        default: "3"
      topic:
        description: "Manual topic override (leave empty for automatic Agent 01 selection)"
        required: false
        default: ""
      draft_only:
        description: "Draft-only (safety default): skip PRODUCED.json so no topic can be promoted to published — WordPress drafts are still created, just never marked producible. Set false only for a real publish run."
        required: false
        default: true
        type: boolean
      force_opportunity_tier:
        description: "Rodage safety (default on): force every article to OPPORTUNITY tier, skipping the STANDARD/PILLAR revenue-score promotion. STANDARD/PILLAR have failed GATE LENGTH even after retry on every witness run this session so far — forcing OPPORTUNITY avoids burning ~2x the API calls per article for zero output while crons are freshly reactivated. Set false only once STANDARD/PILLAR's GATE LENGTH calibration is fixed."
        required: false
        default: true
        type: boolean

env:
  PYTHON_VERSION: "3.11"
  MAX_ARTICLES_PER_BATCH: 3
  MAX_ARTICLES_PER_DAY: 6
  MIN_WORD_COUNT: 4000
  MAX_WORD_COUNT: 5000
  MIN_IMAGES: 4
  MIN_FAQ: 10
  MIN_INTERNAL_LINKS: 6
  MIN_SOURCES: 5
  EEAT_SCORE_THRESHOLD: 85
  FACT_CHECK_MIN_SOURCES: 5
  CANADA_NEWCOMER_PRIORITY: "true"
  SYSTEM_VERSION: "PRODUCTION-V4.0-RELIABLE"

jobs:

  route-trigger:
    name: "Route -- Trigger Mode"
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.detect.outputs.mode }}
      max_articles: ${{ steps.detect.outputs.max_articles }}
    steps:
      - name: Detect trigger mode
        id: detect
        run: |
          HOUR=$(date -u +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
            echo "max_articles=${{ github.event.inputs.max_articles }}" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "06" ]; then
            echo "mode=batch_1" >> $GITHUB_OUTPUT
            # RODAGE (2026-07-11): 1 article/slot -- controlled budget,
            # human-inspectable draft volume, lighter bursts to Hostinger.
            # MAX_ARTICLES_PER_DAY stays 6 below (a ceiling, not a target).
            echo "max_articles=1" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "13" ]; then
            echo "mode=batch_2" >> $GITHUB_OUTPUT
            echo "max_articles=1" >> $GITHUB_OUTPUT
          else
            echo "mode=batch_1" >> $GITHUB_OUTPUT
            echo "max_articles=1" >> $GITHUB_OUTPUT
          fi

  production-batch:
    name: "Production Batch -- 3 Articles"
    runs-on: ubuntu-latest
    needs: route-trigger
    if: |
      needs.route-trigger.outputs.mode == 'batch_1' ||
      needs.route-trigger.outputs.mode == 'batch_2' ||
      needs.route-trigger.outputs.mode == 'end_to_end_test'
    timeout-minutes: 120
    permissions:
      contents: write   # Sprint 5: push the updated topic registry back (anti-repetition)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # EXTRACTED (2026-07-12) from an inline run: block into scripts/production_batch_loop.sh
      # -- this is the SECOND time GitHub's ~21000-char single-expression limit broke this
      # workflow (first at PR #73, again on 2026-07-11 when it silently invalidated the whole
      # file and skipped the 06:00 UTC scheduled run -- see AUDIT-LOG.md). #73 considered this
      # exact extraction and deferred it; two outages later, it's done.
      - name: "Batch Loop -- 3 Articles Sequential"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
          TOPIC_OVERRIDE: ${{ github.event.inputs.topic }}
          DRAFT_ONLY: ${{ github.event.inputs.draft_only }}
          FORCE_OPPORTUNITY_TIER: ${{ github.event.inputs.force_opportunity_tier }}
          # FIX (2026-07-12): the OLD inline expression referenced
          # `needs.detect.outputs.max_articles` -- a job named "detect" that
          # does not exist ("detect" is only route-trigger's STEP id) -- so
          # that fallback was always empty and every scheduled run silently
          # used the literal `3` default, never route-trigger's real
          # per-slot value (e.g. the `1` set for the rodage phase). Passed
          # correctly here as two separate values; scripts/production_batch_loop.sh
          # resolves the fallback chain in bash.
          MAX_ARTICLES_INPUT: ${{ github.event.inputs.max_articles }}
          MAX_ARTICLES_ROUTE: ${{ needs.route-trigger.outputs.max_articles }}
        run: bash scripts/production_batch_loop.sh

      - name: Upload article reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "nexus14-v4-reports-${{ github.run_id }}"
          retention-days: 30
          path: |
            output/article_1/
            output/article_2/
            output/article_3/

      - name: Reconcile topic registry (published on success, rollback on failure)
        if: always()   # terminal reconciliation: guarantees no in_progress is ever committed
        run: |
          PYTHONPATH=. python -m agents.agent_01_seo_research --reconcile --output-dir output
          if git diff --quiet -- data/topic_registry.json; then
            echo "Topic registry unchanged (no successful publish / manual override) — nothing to commit"
          else
            git config user.name  "nexus14-bot"
            git config user.email "actions@users.noreply.github.com"
            git add data/topic_registry.json
            git commit -m "chore(topics): reconcile registry — published/rollback [skip ci]"
            git push origin "HEAD:${GITHUB_REF_NAME}"
            echo "Topic registry reconciled and pushed to ${GITHUB_REF_NAME}"
          fi

  global-audit:
    name: "Global Quality Audit"
    runs-on: ubuntu-latest
    needs: route-trigger
    if: needs.route-trigger.outputs.mode == 'audit'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run Global Audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
        run: |
          python -m agents.agent_13_chief_editor --mode global-audit \
            --output output/agent_13/global_audit_report.json

  production-report:
    name: "Production Report"
    runs-on: ubuntu-latest
    needs: route-trigger
    if: needs.route-trigger.outputs.mode == 'executive_report'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Generate Report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m agents.agent_14_production_director \
            --mode executive_report \
            --output output/agent_14/daily_production_report.html \
            --system-version PRODUCTION-V4.0-RELIABLE \
            --max-daily 6 --quality-first true
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "nexus14-daily-report-${{ github.run_id }}"
          retention-days: 90
          path: output/agent_14/daily_production_report.html
