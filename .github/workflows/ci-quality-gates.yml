      - name: L189 internal-URL truncation fix (offline) -- no network, no API key
        env:
          ANTHROPIC_API_KEY: ""
          PYTHONPATH: "."
        run: |
          pytest -v tests/test_fix_l189_internal_url.py

      - name: Prose-polish tests (offline) -- no network, no API key
        env:
          ANTHROPIC_API_KEY: ""
          PYTHONPATH: "."
        run: |
          pytest -v tests/test_lot_prose_polish.py

      - name: Dangle filet tests (Part 2 -- deletion-only last resort) offline
        env:
          ANTHROPIC_API_KEY: ""
          PYTHONPATH: "."
        run: |
          pytest -v tests/test_lot_dangle_filet.py

      - name: Workflow blocking semantics test
        run: |
          chmod +x tests/test_workflow_blocking.sh
          bash tests/test_workflow_blocking.sh
