# CI Quality Gates — durable guard rail (compile + YAML lint + regression tests).
# Runs on every PR to main, on push to main, on the sprint-1 branch, and on manual
# dispatch. Blocks any change that reintroduces a non-blocking sys.exit(0) or a
# hardcoded word floor (RCA-005 regression guard).

name: CI Quality Gates

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - sprint-1-arret-hemorragie
      - sprint-2-writer-sonnet
  workflow_dispatch:

jobs:
  quality-gates:
    name: compile + yaml lint + regression tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml

      - name: py_compile edited agents
        run: |
          python -m py_compile agents/agent_12_quality_assurance.py
          python -m py_compile agents/agent_13_chief_editor.py
          python -m py_compile agents/agent_04_article_writer.py
          python -m py_compile agents/_sources.py
          python -m py_compile agents/agent_05_fact_checker.py
          python -m py_compile agents/agent_11_wordpress_integration.py
          python -m py_compile agents/_fallback_image.py
          python -m py_compile agents/_claims.py
          python -m py_compile scripts/soften_claims.py
          python -m py_compile scripts/g_substance_gate.py
          python -m py_compile scripts/polish_prose.py
          python -m py_compile agents/_source_pool.py
          python -m py_compile agents/_vertical_facts.py
          python -m py_compile agents/agent_01_seo_research.py
          python -m py_compile scripts/g3_repetition_gate.py
          python -m py_compile scripts/dri_metric.py
          python -m py_compile scripts/ugc_publish_notifier.py

      - name: YAML lint (yaml.safe_load parse)
        run: |
          python - <<'PY'
          import yaml
          for f in [".github/workflows/production_v2.yml",
                    ".github/workflows/production_daily_v3.yml",
                    ".github/workflows/ugc-publish-notifier.yml"]:
              with open(f) as fh:
                  yaml.safe_load(fh)
              print("OK: " + f + " parses as valid YAML")
          PY

      - name: UGC publish notifier tests (offline) -- no network, no secrets
        run: |
          pip install "requests==2.31.0"
          pytest -v tests/test_ugc_publish_notifier.py

      - name: Regression tests (RCA-005 proof) -- API key intentionally unset
        env:
          ANTHROPIC_API_KEY: ""
        run: |
          pytest -v tests/test_sprint1_blocking_gates.py

      - name: Sprint 2 tests (G3 + DRI + writer model + digest) -- API key intentionally unset
        env:
          ANTHROPIC_API_KEY: ""
        run: |
          pytest -v tests/test_sprint2_quality.py

      - name: Sprint 5 topic engine tests (offline) -- no network, no API key
        env:
          ANTHROPIC_API_KEY: ""
          PYTHONPATH: "."   # repo root on sys.path so `import agents...` resolves under bare pytest
        run: |
          pytest -v tests/test_sprint5_topic_engine.py

      - name: Sprint 6 registry lifecycle tests (offline) -- no network, no API key
        env:
          ANTHROPIC_API_KEY: ""
          PYTHONPATH: "."   # repo root on sys.path so `import agents...` resolves under bare pytest
        run: |
          pytest -v tests/test_sprint6_registry_lifecycle.py

      - name: Sprint 7 US source pool tests (offline) -- no network, no API key
        env:
          ANTHROPIC_API_KEY: ""
          PYTHONPATH: "."   # repo root on sys.path so `import agents...` resolves under bare pytest
        run: |
          pytest -v tests/test_sprint7_us_source_pool.py

      - name: Sprint 8 output sanitization tests (offline) -- no network, no API key
        env:
          ANTHROPIC_API_KEY: ""
          PYTHONPATH: "."   # repo root on sys.path so `import agents...` resolves under bare pytest
        run: |
