name: V4 Validation Harness

# Manually-triggered (and feature-branch push-triggered) OFFLINE validation of
# the V4 decision core. Runs the real V4 agents (17 / 19 / 20) and the
# authoritative Quality Gate against deterministic in-memory fixtures using the
# offline "hashing" embeddings backend. It contacts NO WordPress site and NO
# OpenAI API, and does NOT publish, deploy, or run the live schema migration.
#
# The push trigger is scoped to the feature branch only so the harness can run
# in CI without merging anything into main.

on:
  workflow_dispatch:
  push:
    branches:
      - feature/nexus14-v4-enterprise
    paths:
      - "scripts/validate_v4_pipeline.py"
      - ".github/workflows/validate-v4.yml"

permissions:
  contents: read

jobs:
  validate:
    name: validate-v4 (offline)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests aiohttp pyyaml
          fi

      - name: Run V4 offline validation harness
        env:
          EMBEDDINGS_PROVIDER: hashing
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python scripts/validate_v4_pipeline.py

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: v4-validation-report-${{ github.run_id }}
          path: output/validation_v4/validation_report.json
          retention-days: 30
          if-no-files-found: warn
