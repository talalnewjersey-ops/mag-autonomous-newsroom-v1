name: Test Image Subject Prompts (throwaway diagnostic)

on:
  workflow_dispatch:

# THROWAWAY DIAGNOSTIC, not production: calls Gemini directly with 3 test
# prompts (abstract financial topics: savings, credit building, money
# transfer) built from the subject-injection template proposed to replace
# agent_09's hardcoded topic buckets. Never touches WordPress, never touches
# data/topic_registry.json, never runs the production pipeline. Separate
# from production_v2.yml on purpose.
jobs:
  test-image-subjects:
    name: "Generate 3 test images for abstract-topic verification"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install aiohttp
        run: pip install aiohttp
      - name: Generate test images
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 scripts/test_image_subject_prompts.py --output-dir test_image_output
      - name: Upload test images
        uses: actions/upload-artifact@v4
        with:
          name: image-subject-test-results
          path: test_image_output/
