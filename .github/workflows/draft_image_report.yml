name: Draft Image Report

on:
  workflow_dispatch:

  jobs:
    report:
        runs-on: ubuntu-latest
            steps:
                  - name: Install dependencies
                          run: pip install requests -q

                                - name: Run image report
                                        env:
                                                  WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
                                                            WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
                                                                      WORDPRESS_PASSWORD: ${{ secrets.WORDPRESS_PASSWORD }}
                                                                              run: |
                                                                                        python3 - <<'EOF'
                                                                                                  import requests, os, re
                                                                                                            from base64 import b64encode
                                                                                                            
                                                                                                                      WP_URL = os.environ.get("WORDPRESS_URL","https://moneyabroadguide.com").rstrip("/")
                                                                                                                                WP_USER = os.environ.get("WORDPRESS_USERNAME","")
                                                                                                                                          WP_PASS = os.environ.get("WORDPRESS_PASSWORD","")
                                                                                                                                                    creds = b64encode((WP_USER+":"+WP_PASS).encode()).decode()
                                                                                                                                                              HDR = {"Authorization":"Basic "+creds,"Accept":"application/json"}
                                                                                                                                                              
                                                                                                                                                                        # Fetch all drafts paginated
                                                                                                                                                                                  all_posts = []
                                                                                                                                                                                            page = 1
                                                                                                                                                                                                      while True:
                                                                                                                                                                                                                    r = requests.get(f"{WP_URL}/wp-json/wp/v2/posts", headers=HDR,
                                                                                                                                                                                                                                      params={"status":"draft","per_page":100,"page":page,
                                                                                                                                                                                                                                                                "_fields":"id,title,featured_media,content"}, timeout=30)
                                                                                                                                                                                                                                                                              if r.status_code != 200:
                                                                                                                                                                                                                                                                                                print(f"Error fetching page {page}: {r.status_code} {r.text[:200]}")
                                                                                                                                                                                                                                                                                                                  break
                                                                                                                                                                                                                                                                                                                                data = r.json()
                                                                                                                                                                                                                                                                                                                                              if not data:
                                                                                                                                                                                                                                                                                                                                                                break
                                                                                                                                                                                                                                                                                                                                                                              all_posts.extend(data)
                                                                                                                                                                                                                                                                                                                                                                                            total_pages = int(r.headers.get("X-WP-TotalPages",1))
                                                                                                                                                                                                                                                                                                                                                                                                          if page >= total_pages:
                                                                                                                                                                                                                                                                                                                                                                                                                            break
                                                                                                                                                                                                                                                                                                                                                                                                                                          page += 1
                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                    print(f"\n{'='*70}")
                                                                                                                                                                                                                                                                                                                                                                                                                                                              print(f"RAPPORT IMAGES - ARTICLES EN DRAFT")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        print(f"{'='*70}")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  print(f"Total drafts trouves : {len(all_posts)}")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            print(f"{'='*70}\n")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      with_featured = []
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                without_featured = []
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          for post in all_posts:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        pid = post["id"]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      title = post["title"]["rendered"]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    featured = post.get("featured_media", 0)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  content = post.get("content",{}).get("rendered","")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                # Count inline images in content
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              inline_imgs = len(re.findall(r'<img\s', content, re.IGNORECASE))
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if featured and featured != 0:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              with_featured.append((pid, title, featured, inline_imgs))
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            else:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              without_featured.append((pid, title, 0, inline_imgs))
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        print(f"ARTICLES AVEC IMAGE FEATURED ({len(with_featured)}):")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  print(f"{'-'*70}")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            for pid, title, fid, inline in with_featured:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          total = inline + 1  # featured + inline
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        print(f"  ID={pid} | featured_id={fid} | inline={inline} | TOTAL={total} img")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      print(f"         Titre: {title[:65]}")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          print(f"\nARTICLES SANS IMAGE FEATURED ({len(without_featured)}):")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    print(f"{'-'*70}")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              for pid, title, fid, inline in without_featured:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            status = "INLINE ONLY" if inline > 0 else "AUCUNE IMAGE"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          print(f"  ID={pid} | featured=NON | inline={inline} | {status}")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        print(f"         Titre: {title[:65]}")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  print(f"\n{'='*70}")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            print(f"RESUME FINAL:")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      print(f"  Total drafts          : {len(all_posts)}")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                print(f"  Avec image featured   : {len(with_featured)}")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          print(f"  Sans image featured   : {len(without_featured)}")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    no_img_at_all = [p for p in without_featured if p[3] == 0]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              has_inline_only = [p for p in without_featured if p[3] > 0]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        print(f"  Sans AUCUNE image     : {len(no_img_at_all)}")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  print(f"  Inline seulement      : {len(has_inline_only)}")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            print(f"{'='*70}")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      EOF
