name: List WordPress Drafts (read-only diagnostic)

on:
  workflow_dispatch:
    inputs:
      diagnose_ids:
        description: "Comma-separated post IDs to also check directly by ID (context=edit, bypasses the list endpoint's own status filter/cache)"
        required: false
        default: ""

# READ-ONLY: lists existing draft posts via the WP REST API so residual drafts
# from prior control runs can be identified before a cleanup. Never writes to
# WordPress, never touches data/topic_registry.json, never generates content.
jobs:
  list-drafts:
    name: "List draft posts"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Query WP REST API for all draft posts
        env:
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
          DIAGNOSE_IDS: ${{ github.event.inputs.diagnose_ids }}
        run: python3 scripts/list_wp_drafts.py
