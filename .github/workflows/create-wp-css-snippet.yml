name: Create WordPress CSS Code Snippet (write, CSS-only, scope hardcoded)

on:
  workflow_dispatch:
    inputs:
      snippet_name:
        description: "Snippet name"
        required: true
      snippet_desc:
        description: "Snippet description"
        required: false
        default: ""
      code_file:
        description: "Path (in this repo checkout) to the file holding the CSS"
        required: true
      active:
        description: "Activate immediately"
        required: true
        default: "true"
      confirm:
        description: "Type 'yes' to actually write (safety gate)"
        required: true
        default: "no"

# WRITE ACTION: creates one Code Snippets entry, hardcoded to scope=site-css
# (CSS-only, output in <head> sitewide -- never executes PHP). Additive only.
jobs:
  create-snippet:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Create CSS snippet
        env:
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
          SNIPPET_NAME: ${{ github.event.inputs.snippet_name }}
          SNIPPET_DESC: ${{ github.event.inputs.snippet_desc }}
          CODE_FILE: ${{ github.event.inputs.code_file }}
          ACTIVE: ${{ github.event.inputs.active }}
          CONFIRM: ${{ github.event.inputs.confirm }}
        run: python3 scripts/create_wp_css_snippet.py
