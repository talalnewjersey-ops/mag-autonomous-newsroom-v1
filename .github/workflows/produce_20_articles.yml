# NEXUS-14: Production 6 Articles/Day - v2 Engine
# Reduced from 20 articles/day to 6 articles/day, split into two daily batches of 3.
# max-parallel: 2 to prevent WP rate limiting

name: NEXUS-14 Produce 6 Articles

on:
  schedule:
    # Batch 1 (USA) - 08:00 UTC daily - 3 articles
    - cron: '0 8 * * *'
    # Batch 2 (Canada) - 18:00 UTC daily - 3 articles
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      batch:
        description: Batch to run
        required: true
        default: all
        type: choice
        options:
          - all
          - usa_only
          - canada_only

env:
  PYTHON_VERSION: '3.11'

jobs:

  produce-usa:
    name: USA ${{ matrix.index }}
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 25
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.batch == 'all' || github.event.inputs.batch == 'usa_only'))
      || github.event.schedule == '0 8 * * *'
    strategy:
      fail-fast: false
      max-parallel: 2
    matrix:
      include:
        - index: USA-01
          topic: best way to send money from USA to Canada 2026
          market: usa
        - index: USA-02
          topic: cheapest international money transfer services USA 2026
          market: usa
        - index: USA-03
          topic: how to send money abroad from USA fast and cheap 2026
          market: usa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install
        run: pip install openai anthropic requests

      - name: Run
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NANO_BANANA_API_KEY: ${{ secrets.NANO_BANANA_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_PASSWORD: ${{ secrets.WORDPRESS_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          ARTICLE_INDEX: ${{ matrix.index }}
          TARGET_MARKET: ${{ matrix.market }}
          TOPIC_OVERRIDE: ${{ matrix.topic }}
        run: python scripts/produce_article.py

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.index }}-${{ github.run_id }}
          path: execution_report_${{ matrix.index }}.json
          retention-days: 30
          if-no-files-found: warn

  produce-canada:
    name: CANADA ${{ matrix.index }}
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 25
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.batch == 'all' || github.event.inputs.batch == 'canada_only'))
      || github.event.schedule == '0 18 * * *'
    strategy:
      fail-fast: false
      max-parallel: 2
    matrix:
      include:
        - index: CAN-01
          topic: best way to send money from Canada to USA 2026
          market: canada
        - index: CAN-02
          topic: cheapest money transfer services Canada expats 2026
          market: canada
        - index: CAN-03
          topic: how to send money abroad from Canada fast 2026
          market: canada

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install
        run: pip install openai anthropic requests

      - name: Run
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NANO_BANANA_API_KEY: ${{ secrets.NANO_BANANA_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_PASSWORD: ${{ secrets.WORDPRESS_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          ARTICLE_INDEX: ${{ matrix.index }}
          TARGET_MARKET: ${{ matrix.market }}
          TOPIC_OVERRIDE: ${{ matrix.topic }}
        run: python scripts/produce_article.py

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.index }}-${{ github.run_id }}
          path: execution_report_${{ matrix.index }}.json
          retention-days: 30
          if-no-files-found: warn
