name: AdSense Add Authoritative Sources

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Sauvegarde des 19 articles cibles
        env:
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
        run: |
          for slug in \
            best-money-transfer-apps-immigrants \
            student-bank-account-canada-newcomers-2026 \
            tfsa-newcomers-canada-2026 \
            taxes-new-immigrants-canada-cra-guide-2026 \
            rbc-vs-scotiabank-vs-td-newcomers-canada-2026 \
            bank-newcomer-bonus-300-cad-canada-2026 \
            cheapest-provinces-canada-immigrants-2026 \
            best-banks-iranian-newcomers-canada-2026 \
            taxes-for-new-immigrants-to-the-usa-2026 \
            how-to-get-itin-number-usa-2026 \
            moving-to-canada-checklist-2026 \
            best-phone-plans-newcomers-usa-2026 \
            first-apartment-usa-new-immigrants-2026 \
            best-high-yield-savings-accounts-newcomers-usa \
            wise-vs-remitly-canada-2026 \
            cost-of-living-canada-2026 \
            cost-of-living-usa-2026 \
            canada-budget-planner-2026 \
            usa-budget-planner-2026 ; do
            python scripts/adsense_backup.py "$slug" || echo "Sauvegarde echouee pour $slug (probablement introuvable)"
          done

      - name: Commit les sauvegardes
        run: |
          git config user.name "adsense-add-sources-bot"
          git config user.email "actions@github.com"
          git add backups/
          git diff --staged --quiet || git commit -m "chore(backup): avant ajout sources officielles (19 articles)"
          git push

      - name: Apercu (dry-run) de ce qui sera ajoute
        env:
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
        run: python scripts/add_authoritative_sources.py --dry-run

  apply:
    needs: prepare
    runs-on: ubuntu-latest
    environment: wordpress-production
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Ajouter les sources officielles (apres validation humaine)
        env:
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
        run: python scripts/add_authoritative_sources.py --apply

  verify:
    needs: apply
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Re-audit Low Value Content (confirme la reduction du signal E-E-A-T)
        env:
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
        run: python scripts/low_value_content_audit.py

      - name: Controles techniques finaux (H1, HTTP, canonical sur tout le site)
        env:
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
        run: python scripts/phase12_technical_checks.py

      - name: Commit les rapports de verification
        run: |
          git config user.name "adsense-add-sources-bot"
          git config user.email "actions@github.com"
          git add audit/
          git diff --staged --quiet || git commit -m "chore(verify): controles post-ajout sources officielles $(date +%Y-%m-%d)"
          git push
