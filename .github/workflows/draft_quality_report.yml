name: Draft Quality Report

on:
  workflow_dispatch:
    inputs:
      check_links:
        description: 'Run best-effort broken link check (slower)'
        required: false
        default: 'true'

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests -q

      - name: Run draft quality report
        env:
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_PASSWORD: ${{ secrets.WORDPRESS_PASSWORD }}
          CHECK_LINKS: ${{ github.event.inputs.check_links || 'true' }}
        run: python3 scripts/draft_quality_report.py

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: draft-quality-report-${{ github.run_id }}
          path: draft_quality_report.json
          retention-days: 30
          if-no-files-found: warn
