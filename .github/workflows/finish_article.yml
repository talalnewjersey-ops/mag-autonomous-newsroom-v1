name: Finish Article (resume from a fixed downstream gate, no regeneration)

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Run ID whose artifact holds the already-generated article (draft + images already uploaded to WP)"
        required: true
      article_dir:
        description: "article_N directory name inside that artifact, e.g. article_3"
        required: true
      market:
        description: "Market (e.g. Canada, USA)"
        required: true
      category:
        description: "Category (e.g. transferts)"
        required: true
      article_type:
        description: "Tier (OPPORTUNITY, STANDARD, PILLAR)"
        required: true
        default: "OPPORTUNITY"

# ONE-OFF RECOVERY TOOL (2026-07-13): finishes an article that was fully
# generated (draft + images already uploaded to WP by agent_10) but got
# rejected downstream by a bug since fixed (agent_11's tier-blind word
# floor, see AUDIT-LOG.md) -- runs ONLY agent_11 onward, reusing every
# upstream artifact as-is. No content regeneration, no new API cost for
# the writing itself.
jobs:
  finish-article:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore article artifacts from source run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download "${{ github.event.inputs.source_run_id }}" --dir restored --repo ${{ github.repository }}
          mkdir -p "output/${{ github.event.inputs.article_dir }}"
          cp -r restored/*/"${{ github.event.inputs.article_dir }}"/* "output/${{ github.event.inputs.article_dir }}/"
          echo "Restored tree:"
          find "output/${{ github.event.inputs.article_dir }}" -maxdepth 2

      - name: Finish pipeline (agent_11 -> agent_12 -> agent_13 -> production_gate)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
          MIN_WORD_COUNT: 4000
          MIN_IMAGES: 4
          MIN_FAQ: 10
          MIN_INTERNAL_LINKS: 6
          MIN_SOURCES: 5
          EEAT_SCORE_THRESHOLD: 85
        run: |
          set -eo pipefail
          ARTICLE_DIR="output/${{ github.event.inputs.article_dir }}"
          DRAFT="$ARTICLE_DIR/agent_04/article_draft.md"
          MARKET="${{ github.event.inputs.market }}"
          CATEGORY="${{ github.event.inputs.category }}"
          ARTICLE_TYPE="${{ github.event.inputs.article_type }}"

          echo "=== Phase 11: WordPress Draft [GATE C] ==="
          python -m agents.agent_11_wordpress_integration \
            --article "$DRAFT" \
            --images "${ARTICLE_DIR}/agent_10/" \
            --rank-math "${ARTICLE_DIR}/agent_16/publishing_optimizer.json" \
            --output "${ARTICLE_DIR}/agent_11/wordpress_report.json" \
            --market "${MARKET}" --category "${CATEGORY}" \
            --validation-report "${ARTICLE_DIR}/agent_11/wordpress_validation_report.json"

          echo "=== Phase 12-13: QA + Chief Editor ==="
          python -m agents.agent_12_quality_assurance \
            --article "$DRAFT" \
            --wordpress-report "${ARTICLE_DIR}/agent_11/wordpress_report.json" \
            --fact-check "${ARTICLE_DIR}/agent_05/fact_check_report.json" \
            --image-validation "${ARTICLE_DIR}/agent_10/image_validation_report.json" \
            --output "${ARTICLE_DIR}/agent_12/qa_report.json" \
            --article-type "${ARTICLE_TYPE}" \
            --min-words ${MIN_WORD_COUNT} --min-images ${MIN_IMAGES} \
            --min-faq ${MIN_FAQ} --min-links ${MIN_INTERNAL_LINKS} \
            --min-sources ${MIN_SOURCES} --min-case-studies 0 \
            --seo-threshold 85 --eeat-threshold ${EEAT_SCORE_THRESHOLD}

          python -m agents.agent_13_chief_editor \
            --qa-report "${ARTICLE_DIR}/agent_12/qa_report.json" \
            --article "$DRAFT" \
            --article-type "${ARTICLE_TYPE}" \
            --output "${ARTICLE_DIR}/agent_13/editor_report.json"

          echo "=== Production Gate ==="
          python scripts/production_gate.py \
            --fact-check "${ARTICLE_DIR}/agent_05/fact_check_report.json" \
            --eeat-dir "${ARTICLE_DIR}/agent_06" \
            --wordpress-report "${ARTICLE_DIR}/agent_11/wordpress_validation_report.json" \
            --output "${ARTICLE_DIR}/production_gate_result.json"

          echo "=== RESULT ==="
          cat "${ARTICLE_DIR}/agent_11/wordpress_report.json"
          cat "${ARTICLE_DIR}/agent_12/qa_report.json"
          cat "${ARTICLE_DIR}/agent_13/editor_report.json"

      - name: Upload finished article report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "finished-article-${{ github.run_id }}"
          retention-days: 30
          path: output/
