name: V4 Pipeline Tests

# Runs the NEXUS-14 V4 regression suite on every push and pull request that
# touches the branch. The suite is deterministic: it uses the default "hashing"
# embeddings backend, so no API keys or network access are required at runtime.
#
# This workflow makes the branch CI-ready. It does NOT deploy, publish, or run
# the live schema migration. Runtime-dependent gates (Lighthouse / SERP) are not
# exercised here and remain PENDING until provided real measurements.

on:
  push:
    branches:
      - feature/nexus14-v4-enterprise
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: pytest (V4)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install the project runtime deps so import-heavy agents (which import
          # requests / aiohttp at module load) can be collected by pytest.
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests aiohttp
          fi
          # Test tooling (also covers repos whose requirements omit these).
          pip install pytest pyyaml requests

      - name: Run V4 regression suite
        env:
          # Force the deterministic, offline embeddings backend in CI.
          EMBEDDINGS_PROVIDER: hashing
          # Ensure the repo root (services/, agents/, scripts/) is importable.
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Collect the WHOLE tests/ directory so every V4 suite runs:
          #   * tests/test_v4_pipeline.py            (M10 module suite)
          #   * tests/test_v4_validation_harness.py  (decision-core regression)
          pytest tests/ -v --maxfail=1

      - name: Smoke-import V4 modules
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -c "import services.schema_fields, services.content_similarity, services.embeddings_service, services.writer_variation, services.eeat_enrichment"
          python -c "import agents.agent_17_cannibalization, agents.agent_19_originality, agents.agent_20_ymyl_validator, agents.agent_22_performance, agents.agent_23_competitor, agents.agent_04_writer_v4"
          python -c "import scripts.quality_gate_v4, scripts.migrate_schema"
