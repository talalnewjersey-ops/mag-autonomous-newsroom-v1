name: TEMP - Call mag-perf-fixes safe-write diagnostic

on:
  workflow_dispatch:
    inputs:
      expected_before_hash:
        description: "sha256 the live file must match before writing"
        required: true
      new_content_file:
        description: "Path (in this repo) to the new plugin file content"
        required: true

jobs:
  call-safe-write:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Call safe-write diagnostic
        env:
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
          EXPECTED_BEFORE_HASH: ${{ github.event.inputs.expected_before_hash }}
          NEW_CONTENT_FILE: ${{ github.event.inputs.new_content_file }}
        run: python3 scripts/call_mag_safe_write_diag.py
