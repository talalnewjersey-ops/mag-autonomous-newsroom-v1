# Sprint 1 — CI checks (compile + YAML lint + regression tests)
# Runs ONLY on the sprint-1-arret-hemorragie branch and on manual dispatch.
# Does not touch main. Proves Sprint 1 (RCA-005) before merge.

name: Sprint 1 Checks

on:
  push:
    branches:
      - sprint-1-arret-hemorragie
  workflow_dispatch:

jobs:
  sprint1-checks:
    name: compile + yaml lint + regression tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml

      - name: py_compile edited agents
        run: |
          python -m py_compile agents/agent_12_quality_assurance.py
          python -m py_compile agents/agent_13_chief_editor.py

      - name: YAML lint (yaml.safe_load parse)
        run: |
          python - <<'PY'
          import yaml
          for f in [".github/workflows/production_v2.yml",
                    ".github/workflows/production_daily_v3.yml"]:
              with open(f) as fh:
                  yaml.safe_load(fh)
              print("OK: " + f + " parses as valid YAML")
          PY

      - name: Regression tests (RCA-005 proof) -- API key intentionally unset
        env:
          ANTHROPIC_API_KEY: ""
        run: |
          pytest -v tests/test_sprint1_blocking_gates.py

      - name: Workflow blocking semantics test
        run: |
          chmod +x tests/test_workflow_blocking.sh
          bash tests/test_workflow_blocking.sh
