# NEXUS-14: Main Production GitHub Actions Workflow
# MoneyAbroadGuide Autonomous Newsroom V1
# 
# Schedule:
#   06:00 UTC - Morning batch launch
#   15:30 UTC - Evening batch launch
#
# Cron expressions (UTC):
#   06:00 UTC = 02:00 EST = 23:00 PST (previous day)

name: NEXUS-14 Production Pipeline

on:
  schedule:
    # Morning batch - 06:00 UTC daily
    - cron: '0 6 * * *'
    # Evening batch - 15:30 UTC daily  
    - cron: '30 15 * * *'
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Production mode'
        required: true
        default: 'single'
        type: choice
        options:
          - single
          - batch1
          - batch2
          - scheduled
      topics_override:
        description: 'Override topics (comma-separated keywords)'
        required: false

env:
  PYTHON_VERSION: '3.11'
  RUN_ID: ${{ github.run_id }}

jobs:
  # ============================================================
  # JOB 1: Health Check
  # ============================================================
  health-check:
    name: System Health Check
    runs-on: ubuntu-latest
    outputs:
      health_status: ${{ steps.check.outputs.status }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Health check
        id: check
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_RECIPIENT: talalnewjersey@gmail.com
        run: |
          python -c "
          from monitoring.health_check import HealthChecker
          import asyncio
          import sys
          
          async def check():
              hc = HealthChecker({})
              result = await hc.quick_check()
              if result['status'] == 'healthy':
                  print('status=healthy')
                  with open('$GITHUB_OUTPUT', 'a') as f:
                      f.write('status=healthy\n')
              else:
                  print(f'HEALTH CHECK FAILED: {result}')
                  sys.exit(1)
          
          asyncio.run(check())
          "

  # ============================================================
  # JOB 2: SEO Research (Agent 01 + 02)
  # ============================================================
  seo-research:
    name: SEO Research Phase
    runs-on: ubuntu-latest
    needs: health-check
    if: needs.health-check.outputs.health_status == 'healthy'
    
    outputs:
      topics_count: ${{ steps.research.outputs.topics_count }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run SEO Research Agent
        id: research
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SEMRUSH_API_KEY: ${{ secrets.SEMRUSH_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          python main.py --mode research --run-id ${{ env.RUN_ID }}
          
          # Count validated topics
          TOPICS=$(python -c "
          import json
          with open('output/agent_02/validated_topics.json') as f:
              data = json.load(f)
          print(data.get('validated_count', 0))
          ")
          echo "topics_count=$TOPICS" >> $GITHUB_OUTPUT
          echo "Found $TOPICS validated topics"
      
      - name: Upload research artifacts
        uses: actions/upload-artifact@v4
        with:
          name: research-output-${{ env.RUN_ID }}
          path: output/
          retention-days: 7

  # ============================================================
  # JOB 3: Content Production (Agents 03-11)
  # ============================================================
  content-production:
    name: Content Production
    runs-on: ubuntu-latest
    needs: seo-research
    if: needs.seo-research.outputs.topics_count > 0
    strategy:
      matrix:
        batch: [1, 2, 3, 4, 5]
      fail-fast: false
      max-parallel: 2
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Download research artifacts
        uses: actions/download-artifact@v4
        with:
          name: research-output-${{ env.RUN_ID }}
          path: output/
      
      - name: Produce article batch ${{ matrix.batch }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DALLE_API_KEY: ${{ secrets.DALLE_API_KEY }}
          NANO_BANANA_KEY: ${{ secrets.NANO_BANANA_KEY }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
        run: |
          python main.py \
            --mode article \
            --batch-index ${{ matrix.batch }} \
            --run-id ${{ env.RUN_ID }}
      
      - name: Upload article artifacts
        uses: actions/upload-artifact@v4
        with:
          name: article-batch-${{ matrix.batch }}-${{ env.RUN_ID }}
          path: output/
          retention-days: 30

  # ============================================================
  # JOB 4: Quality Audit (Agents 12-13)
  # ============================================================
  quality-audit:
    name: Quality Audit & Editorial
    runs-on: ubuntu-latest
    needs: content-production
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run Quality Assurance
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py --mode qa --run-id ${{ env.RUN_ID }}
      
      - name: Run Chief Editor Audit
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python main.py --mode audit --run-id ${{ env.RUN_ID }}

  # ============================================================
  # JOB 5: Daily Report (Agent 14)
  # ============================================================
  daily-report:
    name: Production Report
    runs-on: ubuntu-latest
    needs: quality-audit
    if: always()
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Generate & Send Daily Report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_RECIPIENT: talalnewjersey@gmail.com
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: |
          python main.py \
            --mode report \
            --run-id ${{ env.RUN_ID }} \
            --report-type daily

# ============================================================
# SECRETS REQUIRED:
# OPENAI_API_KEY, ANTHROPIC_API_KEY, GEMINI_API_KEY
# SERPAPI_KEY, SEMRUSH_API_KEY
# WORDPRESS_URL, WORDPRESS_USERNAME, WORDPRESS_APP_PASSWORD
# SENDGRID_API_KEY, EMAIL_RECIPIENT, EMAIL_FROM
# DALLE_API_KEY, NANO_BANANA_KEY
# AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, S3_BUCKET
# ============================================================
