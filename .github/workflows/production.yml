# NEXUS-14: Legacy V1 Production Workflow — ARCHIVED
# STATUS: ARCHIVED — do NOT re-enable the schedule trigger.
# This workflow is retained for reference only.
# Active production pipeline: .github/workflows/production_v2.yml (NEXUS-14 V4)
#
# CHANGE LOG:
# 2026-06-27: Removed schedule triggers to prevent dual-pipeline conflict with production_v2.yml
#             Both workflows previously fired at 06:00 UTC, causing WordPress API contention.
#             Workflow is now manual-dispatch only.

name: "NEXUS-14 V1 Legacy Pipeline [ARCHIVED — Manual Only]"

on:
  # SCHEDULE TRIGGERS REMOVED — see production_v2.yml for active cron schedule.
    # Re-enabling schedule: here will cause dual pipeline execution at 06:00 UTC.
      workflow_dispatch:
          inputs:
                run_mode:
                        description: 'Production mode (legacy)'
                                required: true
                                        default: 'single'
                                                type: choice
                                                        options:
                                                                  - single
                                                                            - batch1
                                                                                      - batch2
                                                                                                - scheduled
                                                                                                      topics_override:
                                                                                                              description: 'Override topics (comma-separated keywords)'
                                                                                                                      required: false
                                                                                                                      
                                                                                                                      env:
                                                                                                                        PYTHON_VERSION: '3.11'
                                                                                                                          RUN_ID: ${{ github.run_id }}
                                                                                                                          
                                                                                                                          jobs:
                                                                                                                            # ============================================================
                                                                                                                              # JOB 1: Health Check
                                                                                                                                # ============================================================
                                                                                                                                  health-check:
                                                                                                                                      name: System Health Check
                                                                                                                                          runs-on: ubuntu-latest
                                                                                                                                              outputs:
                                                                                                                                                    health_status: ${{ steps.check.outputs.status }}
                                                                                                                                                    
                                                                                                                                                        steps:
                                                                                                                                                              - name: Checkout
                                                                                                                                                                      uses: actions/checkout@v4
                                                                                                                                                                      
                                                                                                                                                                            - name: Setup Python
                                                                                                                                                                                    uses: actions/setup-python@v5
                                                                                                                                                                                            with:
                                                                                                                                                                                                      python-version: ${{ env.PYTHON_VERSION }}
                                                                                                                                                                                                                cache: 'pip'
                                                                                                                                                                                                                
                                                                                                                                                                                                                      - name: Install dependencies
                                                                                                                                                                                                                              run: pip install -r requirements.txt
                                                                                                                                                                                                                              
                                                                                                                                                                                                                                    - name: Health check
                                                                                                                                                                                                                                            id: check
                                                                                                                                                                                                                                                    env:
                                                                                                                                                                                                                                                              ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
                                                                                                                                                                                                                                                                        WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
                                                                                                                                                                                                                                                                                  SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
                                                                                                                                                                                                                                                                                            EMAIL_RECIPIENT: talalnewjersey@gmail.com
                                                                                                                                                                                                                                                                                                    run: |
                                                                                                                                                                                                                                                                                                              echo "Legacy V1 health check — ANTHROPIC_API_KEY used (not OPENAI_API_KEY)"
                                                                                                                                                                                                                                                                                                                        echo "status=healthy" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                          # ============================================================
                                                                                                                                                                                                                                                                                                                            # NOTE: Content production jobs removed from auto-run.
                                                                                                                                                                                                                                                                                                                              # Use production_v2.yml for all production article generation.
                                                                                                                                                                                                                                                                                                                                # ============================================================
                                                                                                                                                                                                                                                                                                                                  archive-notice:
                                                                                                                                                                                                                                                                                                                                      name: Archive Notice
                                                                                                                                                                                                                                                                                                                                          runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                              needs: health-check
                                                                                                                                                                                                                                                                                                                                                  steps:
                                                                                                                                                                                                                                                                                                                                                        - name: Print archive notice
                                                                                                                                                                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                                                                                                                                                                          echo "========================================================"
                                                                                                                                                                                                                                                                                                                                                                                    echo "  NEXUS-14 V1 LEGACY PIPELINE — ARCHIVED"
                                                                                                                                                                                                                                                                                                                                                                                              echo "========================================================"
                                                                                                                                                                                                                                                                                                                                                                                                        echo "  This workflow is retained for reference only."
                                                                                                                                                                                                                                                                                                                                                                                                                  echo "  Active production: .github/workflows/production_v2.yml"
                                                                                                                                                                                                                                                                                                                                                                                                                            echo "  Do not use this workflow for production article generation."
                                                                                                                                                                                                                                                                                                                                                                                                                                      echo "========================================================"
