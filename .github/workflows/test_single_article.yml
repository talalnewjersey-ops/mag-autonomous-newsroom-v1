# NEXUS-14: Single Article Test v3 (Claude Haiku 4.5 + Gemini Images)
# Uses produce_article.py v6.0

name: NEXUS-14 Single Article Test

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Article topic (leave empty for auto-selection)'
        required: false
        default: ''
      market:
        description: 'Target market'
        required: true
        default: 'USA'
        type: choice
        options:
          - USA
          - CANADA
      article_index:
        description: 'Article index (e.g. V6-USA-01)'
        required: false
        default: 'V6-TEST-01'

jobs:
  test-article:
    name: Single Article Test v3 (Claude Haiku 4.5)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run v6.0 produce_article.py (Claude Haiku 4.5)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
          ARTICLE_INDEX: ${{ github.event.inputs.article_index || 'V6-TEST-01' }}
          TARGET_MARKET: ${{ github.event.inputs.market || 'USA' }}
          TOPIC_OVERRIDE: ${{ github.event.inputs.topic || '' }}
        run: python scripts/produce_article.py

      - name: Upload Execution Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v6-report-${{ github.event.inputs.article_index || 'V6-TEST-01' }}-${{ github.run_id }}
          path: execution_report_${{ github.event.inputs.article_index || 'V6-TEST-01' }}.json
          retention-days: 30
          if-no-files-found: warn
