# NEXUS-14: Single Article Test v2
# Uses produce_article.py v2 (fixed engine)

name: NEXUS-14 Single Article Test

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Article topic (leave empty for auto-selection)'
        required: false
        default: ''
      market:
        description: 'Target market'
        required: true
        default: 'USA'
        type: choice
        options:
          - USA
          - CANADA
      article_index:
        description: 'Article index (e.g. TEST-01)'
        required: false
        default: 'TEST-01'

jobs:
  test-article:
    name: Single Article Test v2
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai requests

      - name: Run v2 produce_article.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NANO_BANANA_API_KEY: ${{ secrets.NANO_BANANA_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          ARTICLE_INDEX: ${{ github.event.inputs.article_index || 'TEST-01' }}
          TARGET_MARKET: ${{ github.event.inputs.market || 'USA' }}
          TOPIC_OVERRIDE: ${{ github.event.inputs.topic || '' }}
        run: python scripts/produce_article.py

      - name: Upload Execution Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-v2-report-${{ github.event.inputs.article_index || 'TEST-01' }}-${{ github.run_id }}
          path: execution_report_${{ github.event.inputs.article_index || 'TEST-01' }}.json
          retention-days: 30
          if-no-files-found: warn
