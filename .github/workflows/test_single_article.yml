# NEXUS-14: Single Article Test Workflow
# Purpose: Execute a real single-article production test
# Trigger: Manual only (workflow_dispatch)

name: NEXUS-14 Single Article Test

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Article topic (leave empty for auto-selection)'
        required: false
        default: ''
      market:
        description: 'Target market'
        required: true
        default: 'USA'
        type: choice
        options:
          - USA
          - Canada

env:
  PYTHON_VERSION: '3.11'

jobs:
  test-single-article:
    name: Single Article Test - All 14 Agents
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install openai requests sendgrid pillow aiohttp
          pip install beautifulsoup4 lxml
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi

      - name: Run NEXUS-14 Pipeline
        id: pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NANO_BANANA_API_KEY: ${{ secrets.NANO_BANANA_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_PASSWORD: ${{ secrets.WORDPRESS_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TARGET_MARKET: ${{ github.event.inputs.market }}
          TOPIC_OVERRIDE: ${{ github.event.inputs.topic }}
        run: python scripts/run_test.py

      - name: Upload Execution Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-report-${{ github.run_id }}
          path: execution_report.json
          retention-days: 30

      - name: Final Summary
        if: always()
        run: |
          echo '=== TEST COMPLETE ==='
          if [ -f execution_report.json ]; then
            cat execution_report.json
          fi
