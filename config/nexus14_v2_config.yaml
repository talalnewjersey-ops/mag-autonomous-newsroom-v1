# ============================================================
# NEXUS-14 V3.1 — Master Configuration COST-OPTIMIZED
# MoneyAbroadGuide.com Cost-Optimized Autonomous Newsroom
# Version: 3.1.0
# Active Pipeline: production_v2.yml (V4.0 Reliability-First)
# NOTE: File named nexus14_v2_config.yaml for legacy compatibility.
#       Content reflects V3.1 agent configuration. The active GitHub
#       Actions pipeline is PRODUCTION-V4.0-RELIABLE (production_v2.yml).
# Updated: 2026-06-14
# Philosophy: Maximum quality per dollar. Search intent > article length.
# Platform: Financial education for newcomers, immigrants, international students (Canada/USA)
# ============================================================

system:
  name: "NEXUS-14 V3.1"
  version: "3.1.0"
  previous_version: "3.0.0"
  site: "MoneyAbroadGuide.com"
  code_name: "Cost-Optimized Quality Newsroom"
  active_pipeline: "PRODUCTION-V4.0-RELIABLE (production_v2.yml)"
  config_version_note: "Config at V3.1; active workflow at V4.0"
  primary_ai: "Anthropic Claude API"
  image_ai:
    - "Gemini AI"
    - "Nano Banana"

# ============================================================
# PRODUCTION STRATEGY (V3.1)
# ============================================================
production:
  max_articles_per_day: 6
  max_articles_per_batch: 3
  quality_over_volume: true
  cost_optimization: true
  canada_newcomer_priority: true

  batches:
    batch_1:
      start_time: "06:00 UTC"
      max_articles: 3
    audit_1:
      time: "09:30 UTC"
      type: "Global Quality Audit"
    report_1:
      time: "09:45 UTC"
      type: "Morning Production Report"
    batch_2:
      start_time: "13:00 UTC"
      max_articles: 3
    audit_2:
      time: "16:30 UTC"
      type: "Global Quality Audit"
    report_2:
      time: "18:00 UTC"
      type: "Evening Production Report"
    executive_report:
      time: "18:30 UTC"
      type: "Executive Daily Report"

# ============================================================
# CONTENT REQUIREMENTS (V3.1 — THREE-TIER COST-OPTIMIZED)
# GLOBAL RULE: Maximum quality per dollar. Search intent satisfaction > length.
# ============================================================
content:
  # GLOBAL RULE
  global_rule: "Maximum quality per dollar. Do NOT generate unnecessarily long content."
  max_words_absolute: 5000
  search_intent_priority: true

  # TIER 1: PILLAR (revenue_score > 85 or keyword_difficulty > 50)
  pillar:
    word_count:
      minimum: 4500
      target: 5000
      maximum: 5000
    faq_min: 12
    faq_max: 15
    sources_min: 6
    images_min: 5
    case_studies_min: 3
    internal_links_min: 8

  # TIER 2: STANDARD (default — most articles, revenue_score 70-85)
  standard:
    word_count:
      minimum: 4000
      target: 4500
      maximum: 4500
    faq_min: 10
    faq_max: 12
    sources_min: 5
    images_min: 4
    case_studies_min: 2
    internal_links_min: 6

  # TIER 3: OPPORTUNITY (revenue_score 60-70, low difficulty topics)
  opportunity:
    word_count:
      minimum: 3500
      target: 4000
      maximum: 4000
    faq_min: 8
    faq_max: 10
    sources_min: 3
    images_min: 3
    case_studies_min: 1
    internal_links_min: 4

  # SHARED MANDATORY ELEMENTS (all tiers)
  mandatory_elements:
    comparison_tables: 1
    expert_recommendation_sections: 1
    compliance_disclaimer: 1
    author_box: 1
    checklist_sections: 1
    step_by_step_action_plans: 1

  # ARTICLE CLASSIFICATION
  classification:
    pillar_triggers:
      revenue_score_min: 85
      keyword_difficulty_min: 50
    opportunity_triggers:
      revenue_score_max: 70
    default_tier: "STANDARD"

  # CANADA NEWCOMER PRIORITY (Part 4 Directive)
  canada_newcomer_priority:
    enabled: true
    target_audiences:
      - "Newcomers to Canada"
      - "International Students in Canada"
      - "New Immigrants to Canada"
      - "Temporary Workers in Canada"
      - "Permanent Residents"
      - "Cross-Border Families"
    priority_topics:
      - "Best Bank Account for Newcomers to Canada"
      - "Health Insurance for Newcomers in Canada"
      - "Credit Score Canada Beginner Guide"
      - "First Apartment in Canada Guide"
      - "Cost of Living in Canada 2026"
      - "Best Phone Plans for Newcomers in Canada"
      - "Taxes for New Immigrants to Canada"
      - "How to Build Credit in Canada Fast"
      - "Canada Banking Mistakes to Avoid"
      - "First 90 Days in Canada Checklist"

  target_audience:
    primary: "Newcomers and immigrants to Canada"
    secondary: "Immigrants to USA"
    tertiary: "International students in Canada and USA"
    quaternary: "Expats in Canada and USA"

  topics:
    - "Banking for newcomers/immigrants Canada/USA"
    - "Credit scores for newcomers/immigrants Canada"
    - "Taxes (CRA / IRS) for newcomers"
    - "Insurance for newcomers Canada"
    - "Money transfers for newcomers"
    - "Personal finance Canada/USA for immigrants"
    - "First apartment, phone plans, cost of living Canada"

  writing_standards:
    style: "Human-first, professional, helpful, trustworthy"
    prohibited:
      - "Generic AI introductions"
      - "Unnecessary padding"
      - "Keyword stuffing"
      - "Content that exceeds search intent"
    required:
      - "Practical examples with real numbers"
      - "Actionable recommendations"
      - "Real data from authoritative sources"
      - "Strong EEAT principles"
      - "Canada-specific newcomer advice"

# ============================================================
# IMAGE REQUIREMENTS (V3.1)
# ============================================================
images:
  pillar_articles:
    min_visuals: 5
    max_visuals: 6
  standard_articles:
    min_visuals: 4
    max_visuals: 5
  opportunity_articles:
    min_visuals: 3
    max_visuals: 4
  required_types:
    - featured_image
    - comparison_graphic
    - process_or_checklist_graphic
    - educational_diagram

# ============================================================
# QUALITY GATES (V3.1) — 18 Mandatory Gates (Tier-Adjusted)
# ============================================================
quality_gates:
  # STANDARD TIER DEFAULTS (PILLAR and OPPORTUNITY have overrides)
  gate_01_word_count_min: 4000
  gate_02_images_min: 4
  gate_03_featured_image_required: true
  gate_04_faq_min: 10
  gate_05_internal_links_min: 6
  gate_06_sources_min: 5
  gate_07_case_studies_min: 2
  gate_08_author_required: true
  gate_09_author_bio_required: true
  gate_10_seo_score_min: 90
  gate_11_eeat_score_min: 90
  gate_12_affiliate_compliance_required: true
  gate_13_publishing_optimization_required: true
  gate_14_broken_links_max: 0
  gate_15_wordpress_draft_exists: true
  gate_16_cannibalization_pass: true
  gate_17_revenue_score_min: 60
  gate_18_image_quality_validation: true

  # PILLAR overrides
  pillar_overrides:
    gate_01_word_count_min: 4500
    gate_02_images_min: 5
    gate_04_faq_min: 12
    gate_05_internal_links_min: 8
    gate_06_sources_min: 6
    gate_07_case_studies_min: 3

  # OPPORTUNITY overrides
  opportunity_overrides:
    gate_01_word_count_min: 3500
    gate_02_images_min: 3
    gate_04_faq_min: 8
    gate_05_internal_links_min: 4
    gate_06_sources_min: 3
    gate_07_case_studies_min: 1

  failure_policy:
    do_not_publish: true
    do_not_create_draft: true
    do_not_report_success: true
    require_explanation: true
    require_fix_instructions: true

# ============================================================
# FACT-CHECKING (V3.1)
# ============================================================
fact_checking:
  standard_articles_min_sources: 5
  pillar_articles_min_sources: 6
  opportunity_articles_min_sources: 3
  priority_sources:
    - "IRS (irs.gov)"
    - "CRA (canada.ca/cra)"
    - "USCIS (uscis.gov)"
    - "FDIC (fdic.gov)"
    - "CFPB (consumerfinance.gov)"
    - "Canada.ca"
    - "Government websites (.gov, .gc.ca)"
    - "Official financial institutions"

# ============================================================
# WORDPRESS (V3.1)
# ============================================================
wordpress:
  author:
    name: "Talal Eddaouahiri"
    bio: "Founder of MoneyAbroadGuide.com helping immigrants, international students and newcomers navigate banking, credit scores, taxes, insurance and personal finance in Canada and USA."
  auto_insert:
    - "Author name"
    - "Author bio"
    - "Featured image"
    - "All generated visuals"
    - "FAQ schema (JSON-LD)"
    - "Internal links"
    - "Rank Math metadata"
    - "Meta title"
    - "Meta description"

# ============================================================
# AGENT STACK (V3.1) — 18 Agents (unchanged)
# ============================================================
agents:
  "01":
    name: "SEO Research Agent V3.4"
    output: "topics.json"
    note: "ARTICLE_NUM env var drives topic rotation per batch loop"
    canada_newcomer_priority: true
  "02":
    name: "Keyword Validation Agent"
    output: "validated_topics.json"
  "03":
    name: "Content Planner Agent"
    output: "article_outline.json"
  "04":
    name: "Article Writer Agent V5.0"
    output: "article_draft.md"
    note: "ARTICLE_TYPE env var determines tier (PILLAR/STANDARD/OPPORTUNITY)"
    max_words: 5000
    tiers:
      pillar: {min: 4500, max: 5000}
      standard: {min: 4000, max: 4500}
      opportunity: {min: 3500, max: 4000}
  "05":
    name: "Fact Checker Agent"
    output: "fact_check_report.json"
    blocking: true
  "06":
    name: "EEAT Validator Agent"
    output: "eeat_report.json"
    blocking: true
  "07":
    name: "Internal Linking Agent"
    output: "internal_links.json"
  "08":
    name: "Affiliate Optimization Agent"
    output: "affiliate_report.json"
  "09":
    name: "Image Prompt Generator Agent"
    output: "image_prompts.json"
  "10":
    name: "Image Production Agent"
    output: "image_validation_report.json"
    image_providers:
      - "Gemini AI"
      - "Nano Banana"
  "11":
    name: "WordPress Integration Agent"
    output: "wordpress_validation_report.json"
    blocking: true
  "12":
    name: "Quality Assurance Agent"
    output: "qa_report.json"
  "13":
    name: "Chief Editor Agent"
    output: "editor_report.json"
  "14":
    name: "Production Director Agent"
    output: "daily_production_report.html"
  "15":
    name: "Affiliate Compliance Agent"
    output: "affiliate_compliance.json"
  "16":
    name: "Publishing Optimization Agent"
    output: "publishing_optimizer.json"
  "17":
    name: "Content Cannibalization Agent"
    output: "cannibalization_report.json"
  "18":
    name: "Revenue Intelligence Agent"
    output: "revenue_score.json"
    revenue_thresholds:
      reject_below: 60
      opportunity_below: 70
      standard_range: "70-85"
      pillar_above: 85

# ============================================================
# REPORTING (V3.1)
# ============================================================
reporting:
  email_recipient: "talalnewjersey@gmail.com"
  service: "SendGrid"

# ============================================================
# ACCEPTANCE CRITERIA (V3.1)
# ============================================================
acceptance_criteria:
  operational_only_if:
    - "Real WordPress Draft URL exists"
    - "Real WordPress Post ID exists"
    - "Real Featured Image URL exists"
    - "Real QA Report exists"
    - "All 18 Quality Gates PASS (tier-adjusted thresholds)"
  failure_policy:
    if_any_missing: "STATUS = FAILED"
    never_report_success: true
